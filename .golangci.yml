# golangci-lint configuration para o projeto MeControla.
# Referências: ADR-009 (forbidigo), RF-09 (depguard fronteiras hexagonais),
#              techspec §Object Calisthenics (revive, cyclomatic)
# Formato: golangci-lint v2
version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - forbidigo
    - depguard
    - unconvert
    - godot
    - whitespace

  settings:
    # forbidigo bloqueia uso de .DSN() fora dos pacotes autorizados.
    # DSN() expõe a senha em texto claro; só SafeDSN() é permitido em logs.
    # Pacotes autorizados: configs/ (definição) e internal/platform/database/ (uso interno).
    forbidigo:
      forbid:
        - pattern: '\.DSN\(\)'
          msg: "Use SafeDSN() para logs. DSN() expõe a senha em texto claro e é proibido fora de configs/ e internal/platform/database/."
        - pattern: '"github\.com/JailtonJunior94/devkit-go'
          msg: "Importe devkit-go apenas via internal/platform/ (observability ou database). Fora desses pacotes, use os tipos re-exportados de platform."

    depguard:
      rules:
        # Regra 1+3+4: domain não importa infrastructure do módulo, application, platform ou configs.
        # Cobre RF-09 (a), (c), (d) — Domain puro.
        # Aplica a TODOS os arquivos; domain packages identificados pelo path do módulo.
        domain-no-infrastructure:
          files:
            - "**internal/**/domain/*.go"
            - "**internal/**/domain/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/conversation/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/agent/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/notifications/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/telemetry/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing/infrastructure"
              desc: "domain não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/conversation/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/agent/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/notifications/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/telemetry/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing/application"
              desc: "domain não pode importar application (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/platform"
              desc: "domain não pode importar platform (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/configs"
              desc: "domain não pode importar configs (Domain puro não conhece config)"
            - pkg: "github.com/spf13/viper"
              desc: "domain não pode importar viper"
        # Regra 2: application não importa infrastructure. Cobre RF-09 (b).
        application-no-infrastructure:
          files:
            - "**internal/**/application/*.go"
            - "**internal/**/application/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/conversation/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/agent/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/notifications/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/telemetry/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing/infrastructure"
              desc: "application não pode importar infrastructure (hexagonal boundary violation)"
        # Platform é fundação técnica compartilhada e não pode depender de módulos de negócio.
        platform-no-business-modules:
          files:
            - "**/internal/platform/*.go"
            - "**/internal/platform/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity"
              desc: "platform não pode importar módulos de negócio"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/conversation"
              desc: "platform não pode importar módulos de negócio"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/agent"
              desc: "platform não pode importar módulos de negócio"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance"
              desc: "platform não pode importar módulos de negócio"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/notifications"
              desc: "platform não pode importar módulos de negócio"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/telemetry"
              desc: "platform não pode importar módulos de negócio"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing"
              desc: "platform não pode importar módulos de negócio"
        # RF-45: billing pode importar identity/domain e identity/application, nunca identity/infrastructure.
        # Garante fronteira hexagonal cross-module: billing não conhece detalhe de persistência identity.
        # Exceção: infrastructure/subsystem/ é o composition root e faz o wire concreto.
        billing-no-identity-infrastructure:
          files:
            - "**/internal/billing/domain/**/*.go"
            - "**/internal/billing/application/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/infrastructure"
              desc: "billing/domain e billing/application não podem importar identity/infrastructure (RF-45 — cross-module boundary violation: use identity/domain ou identity/application)"

        # Regra 5 (cross-module): identity não importa finance diretamente.
        # Comunicação cross-module apenas via interface (application) ou Domain Event.
        identity-no-finance:
          files:
            - "**/internal/identity/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance"
              desc: "identity não pode importar finance diretamente (cross-module boundary violation — use interface em application ou Domain Event)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/domain"
              desc: "identity não pode importar finance diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/application"
              desc: "identity não pode importar finance diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/infrastructure"
              desc: "identity não pode importar finance diretamente (cross-module boundary violation)"
        # RF-16: identity não importa billing diretamente (cross-module boundary violation).
        identity-no-billing:
          files:
            - "**/internal/identity/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing"
              desc: "identity não pode importar billing diretamente (cross-module boundary violation — use interface em application ou Domain Event)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing/domain"
              desc: "identity não pode importar billing diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing/application"
              desc: "identity não pode importar billing diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/billing/infrastructure"
              desc: "identity não pode importar billing diretamente (cross-module boundary violation)"
        # RF-16: identity não importa onboarding diretamente (cross-module boundary violation).
        identity-no-onboarding:
          files:
            - "**/internal/identity/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/onboarding"
              desc: "identity não pode importar onboarding diretamente (cross-module boundary violation — use interface em application ou Domain Event)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/onboarding/domain"
              desc: "identity não pode importar onboarding diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/onboarding/application"
              desc: "identity não pode importar onboarding diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/onboarding/infrastructure"
              desc: "identity não pode importar onboarding diretamente (cross-module boundary violation)"
        # Regra 5 (cross-module): finance não importa identity diretamente.
        finance-no-identity:
          files:
            - "**/internal/finance/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity"
              desc: "finance não pode importar identity diretamente (cross-module boundary violation — use interface em application ou Domain Event)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/domain"
              desc: "finance não pode importar identity diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/application"
              desc: "finance não pode importar identity diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/identity/infrastructure"
              desc: "finance não pode importar identity diretamente (cross-module boundary violation)"
        # Regra 5 (cross-module): conversation não importa finance diretamente.
        conversation-no-finance:
          files:
            - "**/internal/conversation/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/domain"
              desc: "conversation não pode importar finance diretamente (cross-module boundary violation — use interface em application ou Domain Event)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/application"
              desc: "conversation não pode importar finance diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/infrastructure"
              desc: "conversation não pode importar finance diretamente (cross-module boundary violation)"
        # Regra 5 (cross-module): agent não importa finance diretamente.
        agent-no-finance:
          files:
            - "**/internal/agent/**/*.go"
          deny:
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/domain"
              desc: "agent não pode importar finance diretamente (cross-module boundary violation — use interface em application ou Domain Event)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/application"
              desc: "agent não pode importar finance diretamente (cross-module boundary violation)"
            - pkg: "github.com/LimaTeixeiraTecnologia/mecontrola/internal/finance/infrastructure"
              desc: "agent não pode importar finance diretamente (cross-module boundary violation)"

    revive:
      rules:
        - name: cyclomatic
          arguments: [15]
        - name: function-length
          arguments: [40, 0]
        - name: exported
          disabled: true

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/LimaTeixeiraTecnologia/mecontrola

exclusions:
  rules:
    # Permite uso de .DSN() dentro de configs/ (é a definição do método)
    # e internal/platform/database/ (uso legítimo para conexão DB).
    - path: "configs/.*\\.go"
      linters:
        - forbidigo
    - path: "internal/platform/database/.*\\.go"
      linters:
        - forbidigo
    # internal/platform/ é o único adaptador autorizado para devkit-go.
    - path: "internal/platform/.*\\.go"
      linters:
        - forbidigo
    # Testes podem ser mais relaxados em comprimento de função.
    - path: "_test\\.go"
      linters:
        - revive
    # Nota: misspell removido dos linters ativos — projeto usa comentários em PT-BR.
