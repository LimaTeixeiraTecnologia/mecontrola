openapi: 3.2.0
info:
  title: MeControla Categories API
  version: 1.0.0
  description: |
    API de catálogo global e dicionário de categorias.
    Todos os endpoints são somente leitura e exigem gateway auth + principal de usuário.
servers:
  - url: /
tags:
  - name: Categories
  - name: Dictionary
paths:
  /api/v1/categories:
    get:
      operationId: listCategories
      tags: [Categories]
      summary: Listar categorias
      parameters:
        - $ref: '#/components/parameters/XUserID'
        - $ref: '#/components/parameters/XGatewayAuth'
        - $ref: '#/components/parameters/XGatewayTimestamp'
        - name: kind
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: include_deprecated
          in: query
          schema:
            type: boolean
            default: false
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Catálogo retornado com sucesso
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCategoriesResponse'
        '304':
          description: Conteúdo não modificado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/categories/{id}:
    get:
      operationId: getCategory
      tags: [Categories]
      summary: Obter categoria por ID
      parameters:
        - $ref: '#/components/parameters/XUserID'
        - $ref: '#/components/parameters/XGatewayAuth'
        - $ref: '#/components/parameters/XGatewayTimestamp'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: include_deprecated
          in: query
          schema:
            type: boolean
            default: false
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Categoria encontrada
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetailResponse'
        '304':
          description: Conteúdo não modificado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/category-dictionary:
    get:
      operationId: listCategoryDictionary
      tags: [Dictionary]
      summary: Listar entradas do dicionário
      parameters:
        - $ref: '#/components/parameters/XUserID'
        - $ref: '#/components/parameters/XGatewayAuth'
        - $ref: '#/components/parameters/XGatewayTimestamp'
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: kind
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: signal_type
          in: query
          schema:
            type: string
            enum: [canonical_name, alias, phrase, merchant, segment]
        - name: cursor
          in: query
          schema:
            type: string
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Página do dicionário
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDictionaryResponse'
        '304':
          description: Conteúdo não modificado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/category-dictionary/search:
    get:
      operationId: searchCategoryDictionary
      tags: [Dictionary]
      summary: Buscar termo no dicionário
      parameters:
        - $ref: '#/components/parameters/XUserID'
        - $ref: '#/components/parameters/XGatewayAuth'
        - $ref: '#/components/parameters/XGatewayTimestamp'
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 3
        - name: kind
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Resultado da busca
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchDictionaryResponse'
        '304':
          description: Conteúdo não modificado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    XUserID:
      name: X-User-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XGatewayAuth:
      name: X-Gateway-Auth
      in: header
      required: true
      schema:
        type: string
    XGatewayTimestamp:
      name: X-Gateway-Timestamp
      in: header
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Falha de autenticação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unprocessable:
      description: Parâmetros inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ListCategoriesResponse:
      type: object
      additionalProperties: true
    CategoryDetailResponse:
      type: object
      additionalProperties: true
    ListDictionaryResponse:
      type: object
      additionalProperties: true
    SearchDictionaryResponse:
      type: object
      additionalProperties: true
    ErrorEnvelope:
      type: object
      additionalProperties: true
