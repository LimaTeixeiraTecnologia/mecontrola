openapi: 3.2.0
info:
  title: MeControla Budgets API
  version: 1.0.0
  description: |
    API de orçamentos mensais, recorrências, despesas e alertas.
    Todos os endpoints exigem gateway auth e principal de usuário.
servers:
  - url: /
tags:
  - name: Budgets
  - name: Expenses
  - name: Alerts
paths:
  /api/v1/budgets:
    post:
      operationId: createBudget
      tags: [Budgets]
      summary: Criar orçamento mensal
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetRequest'
      responses:
        '201':
          description: Orçamento criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/recurrence:
    post:
      operationId: createBudgetRecurrence
      tags: [Budgets]
      summary: Criar recorrência de orçamento
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecurrenceRequest'
      responses:
        '201':
          description: Recorrência criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/alerts:
    get:
      operationId: listBudgetAlerts
      tags: [Alerts]
      summary: Listar alertas
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
        - name: competence
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
        - name: root_slug
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Página de alertas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/expenses:
    post:
      operationId: createBudgetExpense
      tags: [Expenses]
      summary: Registrar despesa
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertExpenseRequest'
      responses:
        '201':
          description: Despesa registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/expenses/{id}:
    patch:
      operationId: updateBudgetExpense
      tags: [Expenses]
      summary: Atualizar despesa
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
        - $ref: '#/components/parameters/ExpenseID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseRequest'
      responses:
        '200':
          description: Despesa atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteBudgetExpense
      tags: [Expenses]
      summary: Remover despesa
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
        - $ref: '#/components/parameters/ExpenseID'
      responses:
        '204':
          description: Despesa removida
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/{competence}/activate:
    post:
      operationId: activateBudget
      tags: [Budgets]
      summary: Ativar orçamento
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
        - $ref: '#/components/parameters/Competence'
      responses:
        '200':
          description: Orçamento ativado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/{competence}:
    delete:
      operationId: deleteBudget
      tags: [Budgets]
      summary: Remover orçamento
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
        - $ref: '#/components/parameters/Competence'
      responses:
        '204':
          description: Orçamento removido
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/budgets/{competence}/summary:
    get:
      operationId: getBudgetMonthlySummary
      tags: [Budgets]
      summary: Obter resumo mensal
      parameters:
        - $ref: '#/components/parameters/AuthUserID'
        - $ref: '#/components/parameters/AuthGateway'
        - $ref: '#/components/parameters/AuthGatewayTimestamp'
        - $ref: '#/components/parameters/Competence'
      responses:
        '200':
          description: Resumo mensal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    AuthUserID:
      name: X-User-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    AuthGateway:
      name: X-Gateway-Auth
      in: header
      required: true
      schema:
        type: string
    AuthGatewayTimestamp:
      name: X-Gateway-Timestamp
      in: header
      required: true
      schema:
        type: string
    ExpenseID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Competence:
      name: competence
      in: path
      required: true
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'
  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Conflito de versão ou estado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unprocessable:
      description: Regra de negócio violada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    CreateBudgetRequest:
      type: object
      additionalProperties: true
    CreateRecurrenceRequest:
      type: object
      additionalProperties: true
    UpsertExpenseRequest:
      type: object
      additionalProperties: true
    UpdateExpenseRequest:
      type: object
      additionalProperties: true
    GenericObject:
      type: object
      additionalProperties: true
    ErrorEnvelope:
      type: object
      additionalProperties: true
