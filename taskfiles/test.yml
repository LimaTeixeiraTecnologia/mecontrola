# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Testes unitarios e de integracao isolados. Integration usa dotenv e
# preconditions para garantir dependencias (ex.: containers) antes de rodar.

vars:
  COVERAGE_DIR: '{{.COVERAGE_DIR | default "coverage"}}'
  UNIT_PROFILE: '{{.COVERAGE_DIR}}/unit.out'
  INTEGRATION_PROFILE: '{{.COVERAGE_DIR}}/integration.out'

tasks:
  all:
    desc: Executa testes unitarios e de integracao.
    cmds:
      - task: unit
      - task: integration

  unit:
    desc: Executa testes unitarios com cobertura.
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -race -covermode=atomic -coverprofile={{.UNIT_PROFILE}} -short ./...
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - '{{.UNIT_PROFILE}}'

  integration:
    desc: Executa testes de integracao (requer Docker para testcontainers).
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker nao esta disponivel; suba as dependencias antes dos testes de integracao."
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -race -covermode=atomic -coverprofile={{.INTEGRATION_PROFILE}} -tags=integration ./...

  coverage:
    desc: Gera relatorio de cobertura agregado em HTML.
    deps: [unit]
    cmds:
      - go tool cover -html={{.UNIT_PROFILE}} -o {{.COVERAGE_DIR}}/coverage.html
      - go tool cover -func={{.UNIT_PROFILE}}

  coverage:identity:
    desc: Cobertura agregada do modulo identity com validacao dos pontos criticos (RF-17).
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -coverprofile={{.COVERAGE_DIR}}/identity.out ./internal/identity/...
      - go tool cover -func={{.COVERAGE_DIR}}/identity.out | grep -E 'NewWhatsAppNumber|NewEmail|IsEntitled'

  e2e:
    desc: Executa testes E2E BDD com Godog (requer Docker).
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker nao esta disponivel; necessario para testes E2E."
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - go test -race -covermode=atomic -coverprofile={{.COVERAGE_DIR}}/e2e.out -tags=e2e -timeout=15m ./internal/transactions/e2e/... ./internal/card/e2e/... ./internal/budgets/e2e/... ./internal/categories/e2e/... ./internal/identity/e2e/... ./internal/onboarding/e2e/... ./internal/billing/e2e/...

  conformance:real:
    desc: |
      Executa a suite de conformidade weather com LLM real via OpenRouter.
      Requer RUN_REAL_LLM=1 e OPENROUTER_API_KEY. Fora do gate de merge.
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - RUN_REAL_LLM=1 go test -race -tags=integration -timeout=5m -v ./test/conformance/weather/...

  watch:
    desc: Reexecuta os testes unitarios ao alterar arquivos.
    watch: true
    sources:
      - '**/*.go'
    cmds:
      - go test -short ./...
