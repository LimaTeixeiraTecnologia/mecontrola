# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Gerenciamento do ambiente de desenvolvimento local via Docker Compose.

vars:
  COMPOSE_BASE: deployment/compose/compose.yml
  COMPOSE_LOCAL: deployment/compose/compose.local.yml
  COMPOSE_CMD: docker compose --env-file .env -f {{.COMPOSE_BASE}} -f {{.COMPOSE_LOCAL}}
  INFRA_SERVICES: postgres otel-lgtm
  APP_SERVICES: server worker

tasks:
  infra:
    desc: Sobe apenas a infraestrutura local (postgres e otel-lgtm) sem a aplicacao.
    cmds:
      - "{{.COMPOSE_CMD}} up -d {{.INFRA_SERVICES}}"
      - 'echo "Infra disponivel: postgres em localhost:5432, Grafana em http://localhost:3000"'

  up:
    desc: Sobe o ambiente local com ordem deterministica (infra, migrate, app).
    cmds:
      - "{{.COMPOSE_CMD}} up -d {{.INFRA_SERVICES}}"
      - "{{.COMPOSE_CMD}} run --rm migrate"
      - "{{.COMPOSE_CMD}} up -d {{.APP_SERVICES}}"
      - 'echo "Ambiente local disponivel em http://localhost:8080 e http://localhost:3000"'

  down:
    desc: Para e remove os containers locais.
    cmds:
      - "{{.COMPOSE_CMD}} down"

  destroy:
    desc: Para tudo e remove volumes locais (apaga dados locais).
    prompt: Isso apagara todos os dados locais. Continuar?
    cmds:
      - "{{.COMPOSE_CMD}} down -v"

  logs:
    desc: Exibe logs dos containers locais (Ctrl+C para sair).
    cmds:
      - "{{.COMPOSE_CMD}} logs -f"

  ps:
    desc: Lista status dos containers locais.
    cmds:
      - "{{.COMPOSE_CMD}} ps"

  db:restart:
    desc: Reinicia apenas postgres e pgbouncer sem derrubar server/worker.
    cmds:
      - "{{.COMPOSE_CMD}} restart postgres pgbouncer"
