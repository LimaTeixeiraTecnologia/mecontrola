# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Supply chain scan: govulncheck + trivy fs/image + SBOM + cosign sign/verify
# ADR-012 (scan + Dependabot) + ADR-013 (cosign keyless + SBOM)
#
# Tarefas executáveis localmente (sem OIDC):
#   security:vulncheck  — govulncheck + trivy fs
#
# Tarefas que requerem OIDC (GitHub Actions) ou imagem no GHCR:
#   security:image-scan, security:sbom, security:sign-image, security:verify-image

vars:
  GOVULNCHECK_VERSION: '{{.GOVULNCHECK_VERSION | default "latest"}}'
  TRIVY_VERSION: '{{.TRIVY_VERSION | default "latest"}}'
  COSIGN_VERSION: '{{.COSIGN_VERSION | default "latest"}}'
  IMAGE_REPO: 'ghcr.io/limateixeiratecnologia/mecontrola'
  IMAGE_SHA: '{{.IMAGE_SHA | default "dev"}}'
  IMAGE_REF: '{{.IMAGE_REPO}}:{{.IMAGE_SHA}}'
  SBOM_FILE: '{{.SBOM_FILE | default "sbom.spdx.json"}}'
  PROVENANCE_FILE: '{{.PROVENANCE_FILE | default "provenance.json"}}'

tasks:
  # ── Local scan (govulncheck + trivy fs) ─────────────────────────────────────
  vulncheck:
    desc: >-
      Verifica vulnerabilidades em dependências Go (govulncheck). Roda localmente sem OIDC.
    preconditions:
      - sh: command -v govulncheck >/dev/null 2>&1
        msg: "govulncheck ausente. Instale: go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}}"
    cmds:
      - govulncheck ./...

  # ── Image scan (trivy image) ─────────────────────────────────────────────────
  image-scan:
    desc: >-
      Varre a imagem Docker publicada no GHCR para CVEs HIGH/CRITICAL.
      Requer IMAGE_SHA e acesso ao GHCR. Exit 1 se CVE encontrada.
      Uso: task security:image-scan IMAGE_SHA=<sha-ou-tag>
    preconditions:
      - sh: command -v trivy >/dev/null 2>&1
        msg: "trivy ausente. Instale: https://aquasecurity.github.io/trivy/latest/getting-started/installation/"
      - sh: '[ "{{.IMAGE_SHA}}" != "dev" ]'
        msg: "IMAGE_SHA obrigatório. Uso: task security:image-scan IMAGE_SHA=<sha-ou-tag>"
    cmds:
      - trivy image --severity HIGH,CRITICAL --exit-code 1 {{.IMAGE_REF}}

  # ── SBOM ────────────────────────────────────────────────────────────────────
  sbom:
    desc: >-
      Gera SBOM no formato SPDX-JSON a partir da imagem Docker publicada no GHCR.
      Requer IMAGE_SHA. Saída em sbom.spdx.json (configurável via SBOM_FILE).
      Uso: task security:sbom IMAGE_SHA=<sha-ou-tag>
    preconditions:
      - sh: command -v trivy >/dev/null 2>&1
        msg: "trivy ausente. Instale: https://aquasecurity.github.io/trivy/latest/getting-started/installation/"
      - sh: '[ "{{.IMAGE_SHA}}" != "dev" ]'
        msg: "IMAGE_SHA obrigatório. Uso: task security:sbom IMAGE_SHA=<sha-ou-tag>"
    cmds:
      - trivy image --format spdx-json --output {{.SBOM_FILE}} {{.IMAGE_REF}}
      - echo "SBOM gerado em {{.SBOM_FILE}}"

  # ── cosign sign + attest ─────────────────────────────────────────────────────
  sign-image:
    desc: >-
      Assina a imagem no GHCR via cosign keyless (OIDC GitHub Actions) e gera
      atestados SBOM (spdxjson) e provenance (slsaprovenance).
      Requer IMAGE_REF (ex: ghcr.io/org/app:tag) e IMAGE_SHA como digest @sha256:...
      OIDC obrigatório (GitHub Actions). Sem fallback silencioso para tag.
      Uso: task security:sign-image IMAGE_REF=ghcr.io/org/app:tag IMAGE_SHA=sha256:<digest>
    requires:
      vars: [IMAGE_REF, IMAGE_SHA]
    preconditions:
      - sh: command -v cosign >/dev/null 2>&1
        msg: "cosign ausente. Instale: https://docs.sigstore.dev/cosign/installation/"
      - sh: '[ "{{.IMAGE_SHA}}" != "dev" ]'
        msg: "IMAGE_SHA obrigatório e deve ser um digest sha256. Uso: task security:sign-image IMAGE_REF=... IMAGE_SHA=sha256:<digest>"
      - sh: 'echo "{{.IMAGE_SHA}}" | grep -qE "^sha256:[a-f0-9]{64}$"'
        msg: "IMAGE_SHA deve ser um digest sha256 (sha256:<64 hex chars>), nao uma tag. Obtenha via: crane digest ghcr.io/org/app:tag"
      - sh: '[ -f "{{.SBOM_FILE}}" ]'
        msg: "{{.SBOM_FILE}} ausente. Execute: task security:sbom IMAGE_SHA={{.IMAGE_SHA}}"
      - sh: '[ -f "{{.PROVENANCE_FILE}}" ]'
        msg: "{{.PROVENANCE_FILE}} ausente. Gere o provenance via GitHub Actions SLSA antes de assinar."
    cmds:
      # 1. Assinar imagem (keyless via OIDC; registra em Rekor transparency log)
      - cosign sign --yes {{.IMAGE_REF}}@{{.IMAGE_SHA}}
      # 2. Atestar SBOM (predicate spdxjson)
      - cosign attest --predicate {{.SBOM_FILE}} --type spdxjson --yes {{.IMAGE_REF}}@{{.IMAGE_SHA}}
      # 3. Atestar provenance SLSA (predicate slsaprovenance)
      - cosign attest --predicate {{.PROVENANCE_FILE}} --type slsaprovenance --yes {{.IMAGE_REF}}@{{.IMAGE_SHA}}

  # ── cosign verify ────────────────────────────────────────────────────────────
  verify-image:
    desc: >-
      Verifica assinatura cosign da imagem no GHCR usando identidade GitHub OIDC.
      Uso: task security:verify-image IMAGE_SHA=<sha-ou-tag>
    preconditions:
      - sh: command -v cosign >/dev/null 2>&1
        msg: "cosign ausente. Instale: https://docs.sigstore.dev/cosign/installation/"
      - sh: '[ "{{.IMAGE_SHA}}" != "dev" ]'
        msg: "IMAGE_SHA obrigatório. Uso: task security:verify-image IMAGE_SHA=<sha-ou-tag>"
    cmds:
      - >-
        cosign verify
        --certificate-identity-regexp '^https://github\.com/LimaTeixeiraTecnologia/mecontrola/'
        --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
        {{.IMAGE_REF}}

  # ── audit ────────────────────────────────────────────────────────────────────
  audit:
    desc: Audita modulos e checa atualizacoes de seguranca.
    cmds:
      - go list -m -u all
      - go mod verify

  # ── VPS firewall ufw ─────────────────────────────────────────────────────────
  vps:firewall:
    desc: >-
      Aplica regras ufw idempotentes no VPS via SSH (22/80/443, deny incoming).
      Passa --force-enable para habilitar o ufw apos aplicar as regras.
      Requer VPS_HOST. Opcional: VPS_USER (default root), FORCE_ENABLE (default false).
      Uso: task security:vps:firewall VPS_HOST=<ip>
           task security:vps:firewall VPS_HOST=<ip> FORCE_ENABLE=true
    vars:
      VPS_HOST: '{{.VPS_HOST | default (env "VPS_HOST")}}'
      VPS_USER: '{{.VPS_USER | default "root"}}'
      FORCE_ENABLE: '{{.FORCE_ENABLE | default "false"}}'
    requires:
      vars: [VPS_HOST]
    cmds:
      - |
        EXTRA_FLAG=""
        SCRIPT_REMOTE="/tmp/vps-firewall-$(date +%s).sh"
        if [ "{{.FORCE_ENABLE}}" = "true" ]; then
          EXTRA_FLAG="--force-enable"
        fi
        echo "==> Copiando script para {{.VPS_USER}}@{{.VPS_HOST}}:${SCRIPT_REMOTE}..."
        scp deployment/scripts/vps-firewall.sh {{.VPS_USER}}@{{.VPS_HOST}}:${SCRIPT_REMOTE}
        echo "==> Executando script remoto..."
        ssh {{.VPS_USER}}@{{.VPS_HOST}} "chmod +x ${SCRIPT_REMOTE} && sudo bash ${SCRIPT_REMOTE} $EXTRA_FLAG && rm -f ${SCRIPT_REMOTE}"
        echo "==> vps:firewall concluido."

  # ── backup-restore-smoke ─────────────────────────────────────────────────────
  backup-restore-smoke:
    desc: >-
      Baixa o ultimo dump cifrado (rclone+age), restaura em Postgres efemero e executa
      smoke queries nas 3 tabelas criticas (users, cards, transactions).
      Requer: rclone, age, docker, psql configurados no host.
      Variaveis obrigatorias: BACKUP_REMOTE, AGE_KEY_FILE (ou PG_RESTORE_ENV_FILE).
      Uso: task security:backup-restore-smoke
    preconditions:
      - sh: command -v rclone >/dev/null 2>&1
        msg: "rclone ausente. Instale: curl https://rclone.org/install.sh | sudo bash"
      - sh: command -v age >/dev/null 2>&1
        msg: "age ausente. Instale: brew install age  ou  apt install age"
      - sh: command -v docker >/dev/null 2>&1
        msg: "docker ausente. Instale: https://docs.docker.com/get-docker/"
      - sh: command -v psql >/dev/null 2>&1
        msg: "psql ausente. Instale: apt install postgresql-client  ou  brew install libpq"
      - sh: command -v pg_isready >/dev/null 2>&1
        msg: "pg_isready ausente. Instale: apt install postgresql-client  ou  brew install libpq"
    cmds:
      - bash deployment/scripts/pg-restore-smoke.sh

  # ── scan (alias completo local) ──────────────────────────────────────────────
  scan:
    desc: Roda toda a verificacao de seguranca local (vulncheck + audit).
    cmds:
      - task: vulncheck
      - task: audit
