# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  outbox-user-id:
    desc: |
      Smoke staging: valida que eventos reais populam aggregate_user_id na tabela
      outbox_events. Requer DATABASE_URL apontando para staging e app em execucao.
      Ver docs/runbooks/outbox-aggregate-user-id.md para detalhes.
    vars:
      DATABASE_URL: '{{.DATABASE_URL | default ""}}'
    preconditions:
      - sh: '[ -n "{{.DATABASE_URL}}" ]'
        msg: "DATABASE_URL nao definida. Exporte DATABASE_URL=postgres://... antes de rodar."
      - sh: command -v psql >/dev/null 2>&1
        msg: "psql ausente. Instale postgresql-client."
    cmds:
      - |
        set -euo pipefail
        echo "==> Smoke: verificando migracao 000017 aplicada..."
        COLUMN=$(psql "{{.DATABASE_URL}}" -tAc \
          "SELECT column_name FROM information_schema.columns \
           WHERE table_schema='mecontrola' AND table_name='outbox_events' \
           AND column_name='aggregate_user_id'")
        if [ -z "$COLUMN" ]; then
          echo "FAIL: coluna aggregate_user_id ausente em outbox_events. Aplique migration 000017."
          exit 1
        fi
        echo "PASS: coluna aggregate_user_id presente."
      - |
        set -euo pipefail
        echo "==> Smoke: contagem base de eventos com aggregate_user_id IS NOT NULL..."
        BEFORE=$(psql "{{.DATABASE_URL}}" -tAc \
          "SELECT count(*) FROM mecontrola.outbox_events WHERE aggregate_user_id IS NOT NULL")
        echo "Eventos com aggregate_user_id antes do smoke: $BEFORE"
        echo "$BEFORE" > /tmp/outbox_smoke_before.txt
      - |
        set -euo pipefail
        echo "==> Smoke: instruindo operador a disparar eventos de cada modulo..."
        echo ""
        echo "  Disparar via API de staging (autenticado):"
        echo "  1. Criar transacao (modulo transactions)"
        echo "  2. Aprovar expense (modulo budgets)"
        echo "  3. Processar evento de subscription Kiwify (modulo billing)"
        echo "  4. Estabelecer principal de usuario (modulo identity)"
        echo ""
        echo "  Aguardando 30s para eventos propagarem..."
        sleep 30
      - |
        set -euo pipefail
        BEFORE=$(cat /tmp/outbox_smoke_before.txt)
        AFTER=$(psql "{{.DATABASE_URL}}" -tAc \
          "SELECT count(*) FROM mecontrola.outbox_events WHERE aggregate_user_id IS NOT NULL")
        echo "Eventos com aggregate_user_id apos smoke: $AFTER"
        if [ "$AFTER" -le "$BEFORE" ]; then
          echo "FAIL: contagem nao aumentou (AFTER=$AFTER, BEFORE=$BEFORE)."
          echo "  Verifique se os eventos foram disparados e se o dispatcher processou."
          exit 1
        fi
        echo "PASS: aggregate_user_id populado em $(($AFTER - $BEFORE)) novo(s) evento(s)."
      - |
        set -euo pipefail
        echo "==> Smoke: verificando ausencia de eventos sem user_id (exceto allowlist)..."
        MISSING=$(psql "{{.DATABASE_URL}}" -tAc \
          "SELECT count(*) FROM mecontrola.outbox_events \
           WHERE aggregate_user_id IS NULL \
           AND created_at > now() - interval '10 minutes'")
        echo "Eventos sem aggregate_user_id nos ultimos 10 minutos: $MISSING"
        if [ "$MISSING" -gt "0" ]; then
          echo "FAIL: $MISSING evento(s) sem aggregate_user_id detectado(s)."
          echo "  Verificar logs: msg=\"outbox.event.missing_aggregate_user_id\""
          echo "  Confirmar se sao eventos da allowlist de sistema (ADR-004)."
          exit 1
        fi
        echo "PASS: nenhum evento sem aggregate_user_id nos ultimos 10 minutos."
        echo "==> Smoke outbox-user-id: concluido."

  outbox-user-id-adversarial:
    desc: |
      Smoke adversarial SQL-only: insere evento manual sem aggregate_user_id para validar
      precondicoes do alerta/housekeeping. Nao valida a metrica Prometheus, que so e
      incrementada pelo publisher da aplicacao.
      Requer DATABASE_URL e METRICS_URL (ex: http://localhost:8080/metrics).
    vars:
      DATABASE_URL: '{{.DATABASE_URL | default ""}}'
      METRICS_URL: '{{.METRICS_URL | default "http://localhost:8080/metrics"}}'
    preconditions:
      - sh: '[ -n "{{.DATABASE_URL}}" ]'
        msg: "DATABASE_URL nao definida."
      - sh: command -v psql >/dev/null 2>&1
        msg: "psql ausente."
      - sh: command -v curl >/dev/null 2>&1
        msg: "curl ausente."
    cmds:
      - |
        set -euo pipefail
        echo "==> Adversarial: capturando baseline da metrica has_user_id=false (referencia apenas)..."
        BEFORE=$(curl -sf "{{.METRICS_URL}}" \
          | grep 'outbox_events_inserted_total{has_user_id="false"}' \
          | awk '{print $2}' || echo "0")
        echo "Baseline has_user_id=false: $BEFORE"
        echo "$BEFORE" > /tmp/outbox_adversarial_before.txt
      - |
        set -euo pipefail
        echo "==> Adversarial: inserindo evento de teste sem aggregate_user_id..."
        TEST_ID=$(psql "{{.DATABASE_URL}}" -tAc "SELECT gen_random_uuid()")
        psql "{{.DATABASE_URL}}" -c \
          "INSERT INTO mecontrola.outbox_events \
             (id, aggregate_type, aggregate_id, event_type, payload, status, created_at) \
           VALUES \
             ('$TEST_ID', 'smoke_test', '$TEST_ID', 'smoke.adversarial.test', '{}', 1, now())"
        echo "Evento de teste inserido: id=$TEST_ID"
        echo "WARN: este evento de teste deve ser limpo pelo housekeeping."
      - |
        set -euo pipefail
        echo "==> Adversarial: aguardando 10s e verificando o evento SQL inserido..."
        sleep 10
        ROWS=$(psql "{{.DATABASE_URL}}" -tAc \
          "SELECT count(*) FROM mecontrola.outbox_events WHERE event_type = 'smoke.adversarial.test' AND aggregate_user_id IS NULL AND created_at > now() - interval '10 minutes'")
        BEFORE=$(cat /tmp/outbox_adversarial_before.txt)
        AFTER=$(curl -sf "{{.METRICS_URL}}" \
          | grep 'outbox_events_inserted_total{has_user_id="false"}' \
          | awk '{print $2}' || echo "0")
        echo "Baseline metrica: $BEFORE | Apos insercao manual: $AFTER"
        if [ "$ROWS" -lt "1" ]; then
          echo "FAIL: evento adversarial sem aggregate_user_id nao foi encontrado na tabela."
          exit 1
        fi
        echo "PASS: evento adversarial presente na tabela com aggregate_user_id NULL."
        echo ""
        echo "NOTA: a metrica outbox_events_inserted_total e incrementada pelo codigo Go durante a insercao via outbox.Publisher."
        echo "A insercao SQL direta acima nao incrementa a metrica e nao deve ser usada como prova de cobertura dela."
        echo "==> Adversarial SQL-only: concluido."
