# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Lint e formatacao. As tarefas falham a pipeline quando ha violacoes.

tasks:
  run:
    desc: Executa o linter estatico e os gates obrigatorios de seguranca/review.
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint ausente. Instale: https://golangci-lint.run/welcome/install/"
    cmds:
      - golangci-lint run ./...
      - task: auth-bypass
      - task: outbox-user-id
      - task: outbox-user-id:test

  fix:
    desc: Aplica correcoes automaticas do linter.
    cmds:
      - golangci-lint run --fix ./...

  fmt:
    desc: Formata o codigo e organiza imports.
    cmds:
      - gofmt -l -w .
      - cmd: command -v goimports >/dev/null 2>&1 && goimports -w . || true
        platforms: [linux, darwin]

  fmt:check:
    desc: Falha se houver arquivos nao formatados (uso em CI).
    preconditions:
      - sh: '[ -z "$(gofmt -l .)" ]'
        msg: "Existem arquivos nao formatados. Rode 'task lint:fmt'."
    cmds:
      - echo "Formatacao OK."

  tidy:
    desc: Verifica se go.mod/go.sum estao consistentes.
    cmds:
      - go mod tidy
      - cmd: git diff --exit-code go.mod go.sum
        platforms: [linux, darwin]

  pci:
    desc: |
      Gate estatico anti-PCI (RF-16). Bloqueia introducao de termos relacionados a dados
      sensiveis de cartao (PAN, CVV/CVC, trilha magnetica, PIN block) em codigo de producao.
      Padroes inequivocos sao usados para evitar falsos positivos em palavras comuns
      ("pin point", "card", "underpin"). Politica: qualquer hit deve ser corrigido — nao
      existe lista de excecoes.
    cmds:
      - |
        set -eu
        PATTERN='(\bPAN\b|\bpan_number\b|\bcardholder_pan\b|\bprimary_account_number\b|\bcvv\b|\bcvc\b|\bcvv2\b|\bcvc2\b|\bcvv_code\b|\bcvc_code\b|\btrack1\b|\btrack2\b|\btrack_data\b|\bmagstripe\b|\bcard_number\b|\bcardNumber\b|\bcc_number\b|\bccNumber\b|\bpin_block\b|\bpinBlock\b|\bcardholder_pin\b|\bcardholderPin\b)'
        HITS=$(grep -rEn \
          --include="*.go" --include="*.sql" --include="*.yaml" --include="*.yml" --include="*.json" \
          --exclude-dir=mocks --exclude-dir=vendor --exclude-dir=node_modules --exclude-dir=.git \
          --exclude="*_test.go" \
          -i "$PATTERN" \
          internal/ migrations/ docs/ cmd/ configs/ 2>/dev/null || true)
        if [ -n "$HITS" ]; then
          echo "FAIL: termos PCI detectados em codigo de producao (RF-16)."
          echo "$HITS"
          echo ""
          echo "Politica: nenhuma excecao. Renomeie campos, remova menos vivo ou abra ADR explicito."
          exit 1
        fi
        echo "PASS lint:pci: nenhum termo PCI detectado em codigo de producao"

  user-isolation:
    desc: |
      Gate de defesa em profundidade per-user: toda query UPDATE/DELETE em repositorios
      postgres de modulos per-user (budgets, card, transactions) DEVE conter "user_id"
      na clausula WHERE. Excecoes automaticas: jobs de retencao (Purge/Cleanup/Reap) e
      queries com filtro temporal "now() - interval". Falha o build com lista de violacoes.
    cmds:
      - bash deployment/scripts/lint-repo-user-id.sh

  auth-bypass:
    desc: |
      Gate M-09 (RF-21): todo router que usa InjectPrincipalFromHeader(WithO11y)? DEVE ter
      RequireGatewayAuth no `sub.Use(...)` imediatamente anterior. Falha o CI com arquivo:linha quando a
      ordem for violada ou o gate estiver ausente. Exclui _test.go e mocks/.
    cmds:
      - bash deployment/scripts/lint-auth-bypass.sh

  outbox-user-id:
    desc: |
      Gate: todo construtor de outbox.EventInput/Event em codigo de producao deve popular
      AggregateUserID, exceto event types na allowlist de sistema (ADR-004).
      Allowlist declarada em internal/platform/outbox/system_event_allowlist.go.
      Falha CI com lista de violacoes; PASS com mensagem clara.
      Ver .specs/prd-outbox-aggregate-user-id/prd.md RF-16, RF-17.
    cmds:
      - bash deployment/scripts/lint-outbox-user-id.sh

  outbox-user-id:test:
    desc: |
      Regressao do proprio lint:outbox-user-id. Roda fixtures em tmpdir cobrindo:
      campo ausente, literal vazio, valor populado, variavel, expressao, allowlist hit.
      Garante zero falso positivo e zero falso negativo no gate.
    cmds:
      - bash deployment/scripts/lint-outbox-user-id-test.sh
