# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Gerenciamento de migrations do banco de dados via golang-migrate.

tasks:
  up:
    desc: Aplica todas as migrations pendentes.
    dotenv: ['.env']
    cmds:
      - go run ./cmd/... migrate

  down:
    desc: Reverte todas as migrations aplicadas.
    dotenv: ['.env']
    cmds:
      - go run ./cmd/... migrate-down

  create:
    desc: Cria um novo arquivo de migration (uso task migrate:create -- nome).
    cmds:
      - migrate create -ext sql -dir migrations -seq {{.CLI_ARGS}}
