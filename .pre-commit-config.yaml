repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: detect-private-key

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -l -w
        types: [go]
        pass_filenames: true

      - id: goimports
        name: goimports
        language: system
        entry: sh -c 'goimports -w "$@"' --
        types: [go]
        pass_filenames: true

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bash -c './taskfiles/scripts/ensure-golangci-lint.sh && .tools/bin/golangci-lint run "$@"' --
        types: [go]
        pass_filenames: false

      - id: lint-secrets-in-config
        name: lint secrets in config
        language: system
        entry: bash deployment/scripts/lint-secrets-in-config.sh
        pass_filenames: false
        always_run: true

      - id: check-sops-encryption
        name: check SOPS encryption for prod.secrets.env
        language: system
        entry: bash -c 'grep -q sops deployment/config/prod.secrets.env || exit 1'
        pass_filenames: false
        files: ^deployment/config/prod\.secrets\.env$

      - id: ai-spec-lint
        name: ai-spec lint
        language: system
        entry: ai-spec lint .
        pass_filenames: false
        always_run: true

      - id: conventional-commits
        name: conventional commits
        language: script
        entry: taskfiles/scripts/check-conventional-commit.sh
        stages: [commit-msg]
