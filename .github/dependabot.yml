# .github/dependabot.yml
# ADR-012: Dependabot grupado — gomod + github-actions + docker
# Schedule: semanal terça-feira 06:00 UTC; limite de 10 PRs abertos simultaneos

version: 2

updates:
  # ── Go modules ──────────────────────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      go-deps:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      ci-actions:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"

  # ── Docker ──────────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      docker-base:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
