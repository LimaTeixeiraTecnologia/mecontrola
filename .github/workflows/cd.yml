name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem a publicar na VPS (SHA curto ou semver)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/limateixeiratecnologia/mecontrola

jobs:
  deploy:
    name: Build, Sign & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::8}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          TAGS="${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${{ github.ref_name }}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${TAG_NAME},${{ env.IMAGE_NAME }}:latest"
            echo "is-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep 'TRIVY_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"" || echo "latest")
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin "${VERSION}"

      - name: Scan image for vulnerabilities
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short-sha }}

      - name: Generate SBOM
        run: |
          trivy image \
            --format spdx-json \
            --output sbom.spdx.json \
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short-sha }}

      - name: Generate provenance stub
        run: |
          cat > provenance.json << EOF
          {
            "buildType": "https://slsa.dev/provenance/v0.2",
            "builder": {"id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"},
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                "digest": {"sha1": "${{ github.sha }}"}
              }
            }
          }
          EOF

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.3

      - name: Sign image with cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes ${{ env.IMAGE_NAME }}@${DIGEST}

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign attest \
            --predicate sbom.spdx.json \
            --type spdxjson \
            --yes \
            ${{ env.IMAGE_NAME }}@${DIGEST}

      - name: Attest provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign attest \
            --predicate provenance.json \
            --type slsaprovenance \
            --yes \
            ${{ env.IMAGE_NAME }}@${DIGEST}

      - name: Resolve deploy tag
        id: deploy-tag
        run: |
          # Em workflow_dispatch usa o tag informado; em push usa o short-sha
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.meta.outputs.short-sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_TAG: ${{ steps.deploy-tag.outputs.tag }}
        run: bash deployment/scripts/deploy.sh "$IMAGE_TAG"
