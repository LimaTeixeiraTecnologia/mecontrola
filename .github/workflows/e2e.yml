name: E2E Tests (manual)

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: e2e-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-go-task

      - name: Set up Docker
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - run: task test:e2e

      - name: Upload E2E coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-coverage
          path: coverage/e2e.out
          retention-days: 7

  notify:
    name: Notify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [e2e]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram secrets not configured; skipping notification"
            exit 0
          fi
          if [[ "${{ needs.e2e.result }}" == "success" ]]; then
            STATUS="✅ SUCESSO"
          else
            STATUS="❌ FALHA"
          fi
          MESSAGE="*${{ github.workflow }}*%0A*Repo:* ${{ github.repository }}*%0A*Ref:* ${{ github.ref_name }}*%0A*Status:* ${STATUS}%0A[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}"
