name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/limateixeiratecnologia/mecontrola

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-go-task
      - run: task build:build

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-go-task
        with:
          install-golangci-lint: "true"
      - run: task lint:run
      - run: task lint:fmt:check
      - run: task lint:pci

  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-go-task
      - run: task test:unit
      - name: Upload unit coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-coverage
          path: coverage/unit.out
          retention-days: 1

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-go-task
      - name: Create .env for integration tests
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=local
          APP_MODE=server
          PORT=8080
          SERVICE_NAME_API=mecontrola-api
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=mecontrola
          DB_PASSWORD=mecontrola_password
          DB_NAME=mecontrola_db
          DB_SSL_MODE=disable
          LOG_LEVEL=info
          LOG_FORMAT=json
          OTEL_TRACE_SAMPLE_RATE=0
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
          EOF
      - run: task test:integration
      - name: Upload integration coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-coverage
          path: coverage/integration.out
          retention-days: 1

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-go-task
        with:
          install-govulncheck: "true"
      - run: task security:vulncheck

  build-image:
    name: Build & Push Image
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [build, lint, unit, integration, vulncheck]
    permissions:
      contents: read
      packages: write
      attestations: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::8}"
          echo "image-tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tags=${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.image-tag }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Save image meta artifact
        run: |
          echo "image-tag=${{ steps.meta.outputs.image-tag }}" > image-meta.txt
          echo "image-digest=${{ steps.build.outputs.digest }}" >> image-meta.txt
      - name: Upload image meta for CD
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-meta
          path: image-meta.txt
          retention-days: 7

  scan-image:
    name: Scan Image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build-image
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.build-image.outputs.image-tag }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@efffb483ec7bb162c4b7935f8b35ab6b94136c7b
        with:
          sarif_file: trivy-results.sarif
      - name: Fail on critical or high vulnerabilities
        if: steps.trivy.outcome == 'failure'
        run: exit 1

  sign-image:
    name: Sign Image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build-image
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}

  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, staging]
    timeout-minutes: 20
    needs: [build-image, scan-image, sign-image]
    if: github.ref == 'refs/heads/main'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Deploy to VPS
        env:
          LOCAL_DEPLOY: "true"
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image-tag }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: bash deployment/scripts/deploy.sh "$IMAGE_TAG"

  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: deploy
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Check staging health
        env:
          STAGING_HEALTH_URL: ${{ secrets.STAGING_HEALTH_URL }}
        run: |
          if [[ -z "$STAGING_HEALTH_URL" ]]; then
            echo "STAGING_HEALTH_URL not configured; skipping healthcheck"
            exit 0
          fi
          echo "==> Checking /health"
          curl -fsS --retry 12 --retry-delay 5 --max-time 10 "${STAGING_HEALTH_URL}/health"
          echo "==> Checking /ready"
          curl -fsS --retry 12 --retry-delay 5 --max-time 10 "${STAGING_HEALTH_URL}/ready"
          echo "==> Healthcheck OK"

  notify:
    name: Notify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [build, lint, unit, integration, vulncheck, build-image, scan-image, sign-image, deploy, healthcheck]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram secrets not configured; skipping notification"
            exit 0
          fi
          if [[ "${{ needs.build.result }}" == "success" && \
                "${{ needs.lint.result }}" == "success" && \
                "${{ needs.unit.result }}" == "success" && \
                "${{ needs.integration.result }}" == "success" && \
                "${{ needs.vulncheck.result }}" == "success" && \
                "${{ needs.build-image.result }}" == "success" && \
                "${{ needs.scan-image.result }}" == "success" && \
                "${{ needs.sign-image.result }}" == "success" && \
                "${{ needs.deploy.result }}" == "success" && \
                "${{ needs.healthcheck.result }}" == "success" ]]; then
            STATUS="✅ SUCESSO"
          else
            STATUS="❌ FALHA"
          fi
          MESSAGE="*${{ github.workflow }}*%0A*Repo:* ${{ github.repository }}*%0A*Ref:* ${{ github.ref_name }}*%0A*Commit:* ${{ github.sha }}*%0A*Status:* ${STATUS}%0A[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}"
