name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem a publicar na VPS (SHA curto ou semver)"
        required: true
        type: string

concurrency:
  group: ci-cd-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/limateixeiratecnologia/mecontrola

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache .task/
        uses: actions/cache@v5
        with:
          path: .task/
          key: task-${{ runner.os }}-${{ hashFiles('Taskfile.yml', 'taskfiles/**') }}

      - name: Cache golangci-lint artifacts
        uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-${{ runner.os }}-${{ hashFiles('.golangci.yml') }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install golangci-lint
        run: |
          VERSION=$(grep 'GOLANGCI_LINT_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${VERSION}

      - run: task lint:run
      - run: task lint:fmt:check
      - run: task lint:pci

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - run: task test:unit

      - name: Upload unit coverage
        uses: actions/upload-artifact@v7
        with:
          name: unit-coverage
          path: coverage/unit.out
          retention-days: 1

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create .env for integration tests
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=local
          APP_MODE=server
          PORT=8080
          SERVICE_NAME_API=mecontrola-api
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=mecontrola
          DB_PASSWORD=mecontrola_password
          DB_NAME=mecontrola_db
          DB_SSL_MODE=disable
          LOG_LEVEL=info
          LOG_FORMAT=json
          OTEL_TRACE_SAMPLE_RATE=0
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
          EOF

      - run: task test:integration

      - name: Upload integration coverage
        uses: actions/upload-artifact@v7
        with:
          name: integration-coverage
          path: coverage/integration.out
          retention-days: 1

  e2e:
    name: E2E BDD Tests
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create .env for E2E tests
        run: |
          cat > .env << 'EOF'
          ENVIRONMENT=local
          PORT=8080
          SERVICE_NAME_API=mecontrola-e2e
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          LOG_LEVEL=info
          LOG_FORMAT=json
          OTEL_TRACE_SAMPLE_RATE=0
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
          TRANSACTIONS_ENABLED=true
          EOF

      - run: task test:e2e

      - name: Upload E2E coverage
        uses: actions/upload-artifact@v7
        with:
          name: e2e-coverage
          path: coverage/e2e.out
          retention-days: 1

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install govulncheck
        run: |
          VERSION=$(grep 'GOVULNCHECK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          go install golang.org/x/vuln/cmd/govulncheck@${VERSION}

      - run: task security:vulncheck

  governance:
    name: Governance
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup ai-spec
        uses: JailtonJunior94/orchestrator/.github/actions/setup-ai-spec@bfee8b0c9a68b9e9d96f98d4b2bf27d292332276

      - name: Validate Taskfile
        run: python3 .agents/skills/taskfile-production/scripts/validate-taskfile.py Taskfile.yml

      - name: Check conventional commits (pull request)
        if: github.event_name == 'pull_request'
        run: bash taskfiles/scripts/check-conventional-commit.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Check conventional commits (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: bash taskfiles/scripts/check-conventional-commit.sh "${{ github.event.before }}" "${{ github.sha }}"

      - name: ai-spec doctor
        run: |
          ai-spec doctor .
          ai-spec lint

  card-audit:
    name: Card Audit (R0-R7 + anti-PCI)
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Card module audit
        run: task card:audit

  coverage-comment:
    name: Coverage Comment
    runs-on: ubuntu-latest
    needs: [unit]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v8
        with:
          name: unit-coverage
          path: coverage/

      - name: Post coverage comment
        uses: fgrosse/go-coverage-report@v1
        with:
          coverage-artifact-name: unit-coverage
          coverage-file-name: coverage/unit.out

  build-image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, unit, integration, e2e, security, governance, card-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::8}"
          echo "image-tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tags=${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.image-tag }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image meta artifact
        run: |
          echo "image-tag=${{ steps.meta.outputs.image-tag }}" > image-meta.txt
          echo "image-digest=${{ steps.build.outputs.digest }}" >> image-meta.txt

      - name: Upload image meta for CD
        uses: actions/upload-artifact@v7
        with:
          name: image-meta
          path: image-meta.txt
          retention-days: 7

  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, staging]
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to VPS
        env:
          LOCAL_DEPLOY: "true"
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-image.outputs.image-tag }}
          STAGING_SMOKE_WA: ${{ secrets.STAGING_SMOKE_WA }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: bash deployment/scripts/deploy.sh "$IMAGE_TAG"

  smoke:
    name: Auth Smoke (staging)
    runs-on: [self-hosted, staging]
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Auth smoke test
        env:
          WEBHOOK_URL: ${{ secrets.STAGING_WEBHOOK_URL }}
          META_APP_SECRET: ${{ secrets.STAGING_META_APP_SECRET }}
          SMOKE_WA: ${{ secrets.STAGING_SMOKE_WA }}
          DB_URL: ${{ secrets.STAGING_DB_LOCAL_URL }}
        run: task auth:smoke

      - name: Onboarding ATIVAR smoke test
        env:
          WEBHOOK_URL: ${{ secrets.STAGING_WEBHOOK_URL }}
          META_APP_SECRET: ${{ secrets.STAGING_META_APP_SECRET }}
          DB_URL: ${{ secrets.STAGING_DB_LOCAL_URL }}
        run: task onboarding:smoke

  deploy-manual:
    name: Deploy to VPS (manual)
    runs-on: [self-hosted, staging]
    if: github.event_name == 'workflow_dispatch'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to VPS
        env:
          LOCAL_DEPLOY: "true"
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          STAGING_SMOKE_WA: ${{ secrets.STAGING_SMOKE_WA }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: bash deployment/scripts/deploy.sh "$IMAGE_TAG"

  smoke-manual:
    name: Auth Smoke (staging, manual)
    runs-on: [self-hosted, staging]
    needs: deploy-manual
    if: github.event_name == 'workflow_dispatch'
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install task
        run: |
          set -euo pipefail
          VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          mkdir -p "$HOME/.local/bin"
          sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Auth smoke test
        env:
          WEBHOOK_URL: ${{ secrets.STAGING_WEBHOOK_URL }}
          META_APP_SECRET: ${{ secrets.STAGING_META_APP_SECRET }}
          SMOKE_WA: ${{ secrets.STAGING_SMOKE_WA }}
          DB_URL: ${{ secrets.STAGING_DB_LOCAL_URL }}
        run: task auth:smoke

      - name: Onboarding ATIVAR smoke test
        env:
          WEBHOOK_URL: ${{ secrets.STAGING_WEBHOOK_URL }}
          META_APP_SECRET: ${{ secrets.STAGING_META_APP_SECRET }}
          DB_URL: ${{ secrets.STAGING_DB_LOCAL_URL }}
        run: task onboarding:smoke
