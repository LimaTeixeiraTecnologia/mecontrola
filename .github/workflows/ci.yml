name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      task-version: ${{ steps.vars.outputs.task-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract TASK_VERSION from vars.yml
        id: vars
        run: |
          VERSION=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          echo "task-version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: arduino/setup-task@v2
        with:
          version: ${{ steps.vars.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache .task/
        uses: actions/cache@v4
        with:
          path: .task/
          key: task-${{ runner.os }}-${{ hashFiles('Taskfile.yml', 'taskfiles/**') }}

      - name: Cache mockery artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/golangci-lint
          key: golangci-${{ runner.os }}-${{ hashFiles('.golangci.yml') }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint
        run: |
          VERSION=$(grep 'GOLANGCI_LINT_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin "${VERSION}"

      - run: task lint:run
      - run: task lint:fmt:check
      - run: task lint:pci

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - run: task test:unit

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit.out
          retention-days: 1

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env for integration tests
        run: |
          cat > .env.test << 'EOF'
          ENVIRONMENT=local
          APP_MODE=server
          PORT=8080
          SERVICE_NAME_API=mecontrola-api
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=mecontrola
          DB_PASSWORD=mecontrola_password
          DB_NAME=mecontrola_db
          DB_SSL_MODE=disable
          LOG_LEVEL=info
          LOG_FORMAT=json
          OTEL_TRACE_SAMPLE_RATE=0
          OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
          EOF

      - run: task test:integration

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: coverage/integration.out
          retention-days: 1

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install govulncheck
        run: |
          VERSION=$(grep 'GOVULNCHECK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          go install golang.org/x/vuln/cmd/govulncheck@${VERSION}

      - name: Install Trivy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep 'TRIVY_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin "${VERSION}"

      - run: task security:vulncheck

  governance:
    name: Governance
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup ai-spec
        uses: JailtonJunior94/orchestrator/.github/actions/setup-ai-spec@setup-action-v1

      - name: Validate Taskfile
        run: python3 .agents/skills/taskfile-production/scripts/validate-taskfile.py Taskfile.yml

      - name: Check conventional commits (pull request)
        if: github.event_name == 'pull_request'
        run: bash taskfiles/scripts/check-conventional-commit.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Check conventional commits (push)
        if: github.event_name == 'push'
        run: bash taskfiles/scripts/check-conventional-commit.sh "${{ github.event.before }}" "${{ github.sha }}"

      - name: ai-spec doctor
        run: |
          ai-spec doctor
          ai-spec lint

  card-audit:
    name: Card Audit (R0-R7 + anti-PCI)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Card module audit
        run: task card:audit

  auth-smoke:
    name: Auth Smoke (staging)
    runs-on: ubuntu-latest
    needs: [lint, unit, integration, security, governance, card-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: arduino/setup-task@v2
        with:
          version: ${{ needs.setup.outputs.task-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth smoke test
        env:
          WEBHOOK_URL: ${{ secrets.STAGING_WEBHOOK_URL }}
          META_APP_SECRET: ${{ secrets.STAGING_META_APP_SECRET }}
          SMOKE_WA: ${{ secrets.STAGING_SMOKE_WA }}
          DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: task auth:smoke

  coverage-comment:
    name: Coverage Comment
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: coverage/

      - name: Post coverage comment
        uses: fgrosse/go-coverage-report@v1
        with:
          coverage-artifact-name: unit-coverage
          coverage-file-name: coverage/unit.out
