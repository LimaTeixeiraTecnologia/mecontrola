name: Setup Go + Task
description: Instala Go, Task e ferramentas opcionais (golangci-lint, govulncheck)

inputs:
  go-version-file:
    description: Caminho para o arquivo de versao do Go
    required: false
    default: go.mod
  install-golangci-lint:
    description: Instalar golangci-lint
    required: false
    default: "false"
  install-govulncheck:
    description: Instalar govulncheck
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true

    - name: Expose Go environment
      id: goenv
      shell: bash
      run: |
        set -euo pipefail
        echo "gopath=$(go env GOPATH)" >> "$GITHUB_OUTPUT"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Cache Task binary
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.local/bin/task
        key: task-binary-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('taskfiles/vars.yml') }}

    - name: Cache golangci-lint artifacts
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: |
          ~/.cache/golangci-lint
          ${{ steps.goenv.outputs.gopath }}/bin/golangci-lint
        key: golangci-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.golangci.yml', 'go.mod', 'taskfiles/vars.yml') }}

    - name: Cache govulncheck database
      if: inputs.install-govulncheck == 'true'
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.cache/vulncheck
        key: govulncheck-db-${{ runner.os }}-${{ runner.arch }}-${{ github.run_attempt }}
        restore-keys: |
          govulncheck-db-${{ runner.os }}-${{ runner.arch }}-
          govulncheck-db-${{ runner.os }}-

    - name: Install task
      shell: bash
      run: |
        set -euo pipefail
        if [ -x "$HOME/.local/bin/task" ]; then
          echo "Task ja instalado em $HOME/.local/bin/task"
          exit 0
        fi
        mkdir -p "$HOME/.local/bin"
        VER=$(grep 'TASK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
        sh -c "$(curl -fsSL https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin" "v${VER}"

    - name: Install golangci-lint
      if: inputs.install-golangci-lint == 'true'
      shell: bash
      run: |
        set -euo pipefail
        BIN="${{ steps.goenv.outputs.gopath }}/bin/golangci-lint"
        if [ -x "$BIN" ]; then
          echo "golangci-lint ja instalado em $BIN"
          exit 0
        fi
        VERSION=$(grep 'GOLANGCI_LINT_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
        go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${VERSION}"

    - name: Install govulncheck
      if: inputs.install-govulncheck == 'true'
      shell: bash
      run: |
        set -euo pipefail
        BIN="${{ steps.goenv.outputs.gopath }}/bin/govulncheck"
        if [ -x "$BIN" ]; then
          echo "govulncheck ja instalado em $BIN"
          exit 0
        fi
        VERSION=$(grep 'GOVULNCHECK_VERSION:' taskfiles/vars.yml | awk '{print $2}' | tr -d "'\"")
        go install "golang.org/x/vuln/cmd/govulncheck@${VERSION}"
