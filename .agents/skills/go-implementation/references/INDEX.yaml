# INDEX de carga surgical para go-implementation.
# Resolver: .agents/scripts/resolve-references.sh
# Convenção: o agente sempre tem acesso ao SKILL.md + a este INDEX (~2KB total
# de overhead). references/*.md só são anexadas quando a tarefa bate em
# file_patterns OU diff_signals — economia de tokens em sessões longas.
schema: 1
skill: go-implementation
references:
  - id: architecture
    file: architecture.md
    topics: [arquitetura, packages, camadas]
    always: true  # carga base (Etapa 1 do SKILL.md)
    est_tokens: 800
  - id: api
    file: api.md
    topics: [api, http, handler, gin, echo, fiber, grpc, adapter]
    when_to_load:
      file_patterns: ["**/handler*.go", "**/*handler*.go", "**/api/**", "**/transport/**", "**/http/**", "**/adapters/**"]
      diff_signals: ["gin.", "echo.", "fiber.", "http.HandleFunc", "http.ResponseWriter", "grpc.Server", "(w http.ResponseWriter"]
    est_tokens: 700
  - id: build
    file: build.md
    topics: [build, go.mod, makefile]
    when_to_load:
      file_patterns: ["go.mod", "go.sum", "Makefile", "Dockerfile"]
      diff_signals: []
    est_tokens: 500
  - id: concurrency
    file: concurrency.md
    topics: [goroutine, channel, sync, context, race]
    when_to_load:
      file_patterns: []
      diff_signals: ["go func(", "make(chan", "sync.Mutex", "sync.WaitGroup", "context.WithCancel"]
    est_tokens: 900
  - id: configuration
    file: configuration.md
    topics: [config, env, viper]
    when_to_load:
      file_patterns: ["**/config/**", "**/*.env*"]
      diff_signals: ["os.Getenv", "viper.", "godotenv"]
    est_tokens: 500
  - id: examples-domain-flow
    file: examples-domain-flow.md
    topics: [domain, entity, value-object, aggregate, usecase, application]
    when_to_load:
      # Cobre layout DDD canonico: domain/ (entities/VOs) + application/ (use cases).
      file_patterns: ["**/domain/**", "**/application/**", "**/usecase*/**", "**/usecases/**", "**/internal/**/entity*.go"]
      diff_signals: ["type.*Entity", "type.*Aggregate", "type.*ValueObject", "type.*UseCase", "Execute(ctx context.Context"]
    est_tokens: 1200
  - id: examples-infrastructure
    file: examples-infrastructure.md
    topics: [infra, adapter, gateway, bootstrap, runtime]
    when_to_load:
      # Cobre infrastructure/, gateway/, bootstrap/, runtime/ (recorrentes em Go DDD).
      file_patterns: ["**/infrastructure/**", "**/gateway/**", "**/bootstrap/**", "**/runtime/**"]
      diff_signals: []
    est_tokens: 1100
  - id: examples-testing
    file: examples-testing.md
    topics: [testing, table-driven, t.Run, testify]
    when_to_load:
      file_patterns: ["**/*_test.go"]
      diff_signals: ["t.Run(", "TestMain", "suite.Suite", "testify"]
    est_tokens: 1000
  - id: generics
    file: generics.md
    topics: [generics, type-parameters]
    when_to_load:
      file_patterns: []
      diff_signals: ["[T any]", "[T comparable]", "[K comparable, V any]"]
    est_tokens: 600
  - id: graceful-lifecycle
    file: graceful-lifecycle.md
    topics: [shutdown, signal, sigterm, lifecycle, bootstrap, runtime]
    when_to_load:
      file_patterns: ["**/main.go", "**/cmd/**", "**/bootstrap/**", "**/runtime/**"]
      diff_signals: ["signal.Notify", "context.WithCancel", "SIGTERM", "SIGINT", "server.Shutdown"]
    est_tokens: 700
  - id: interfaces
    file: interfaces.md
    topics: [interface, contract, mock]
    when_to_load:
      file_patterns: []
      diff_signals: ["type.*interface", "interface{"]
    est_tokens: 600
  - id: messaging
    file: messaging.md
    topics: [messaging, kafka, rabbitmq, nats, event]
    when_to_load:
      file_patterns: ["**/messaging/**", "**/events/**"]
      diff_signals: ["kafka.", "amqp.", "nats.", "Publish(", "Subscribe("]
    est_tokens: 800
  - id: observability
    file: observability.md
    topics: [observability, otel, log, metric, trace]
    when_to_load:
      file_patterns: []
      diff_signals: ["otel.", "slog.", "log/slog", "prometheus.", "trace.SpanFromContext"]
    est_tokens: 800
  - id: patterns-behavioral
    file: patterns-behavioral.md
    topics: [strategy, command, observer, behavioral]
    when_to_load:
      file_patterns: []
      diff_signals: []
    est_tokens: 700
  - id: patterns-structural
    file: patterns-structural.md
    topics: [adapter, decorator, structural]
    when_to_load:
      file_patterns: []
      diff_signals: []
    est_tokens: 700
  - id: persistence
    file: persistence.md
    topics: [persistence, database, sql, repository, gorm, sqlx]
    when_to_load:
      file_patterns: ["**/repository/**", "**/repositories/**", "**/persistence/**", "**/db/**", "**/database/**"]
      diff_signals: ["sql.Open", "gorm.Open", "sqlx.", "database/sql", ".QueryContext", ".ExecContext", ".QueryRow", "db.Query(", "db.Exec(", "tx.Query(", "tx.Exec("]
    est_tokens: 900
  - id: resilience
    file: resilience.md
    topics: [retry, circuit-breaker, timeout, backoff]
    when_to_load:
      file_patterns: []
      diff_signals: ["context.WithTimeout", "retry.", "backoff.", "circuit"]
    est_tokens: 700
  - id: security
    file: security.md
    topics: [security, crypto, auth, jwt, tls]
    when_to_load:
      file_patterns: ["**/auth/**", "**/security/**", "**/middleware/**"]
      diff_signals: ["crypto/", "jwt.", "tls.", "os/exec", "exec.Command"]
    est_tokens: 800
  - id: testing
    file: testing.md
    topics: [testing, unit, integration]
    when_to_load:
      file_patterns: ["**/*_test.go"]
      diff_signals: []
    est_tokens: 800
