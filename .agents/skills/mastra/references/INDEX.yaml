schema: 1
skill: mastra
purpose: >-
  Matriz determinística de carregamento de referências por tarefa no internal/agent.
  Carregue apenas required_refs + optional_refs pertinentes. Máximo 4 simultâneas;
  se conflito, priorize as 3 mais críticas e registre as demais como contexto não carregado.

defaults:
  always_load:
    - core-concepts.md
  hard_rules:
    - ".claude/rules/agent-workflows-tools.md"
    - ".claude/rules/go-adapters.md"
  prerequisite_skills:
    - go-implementation
    - agent-governance

task_types:
  add-read-workflow:
    trigger: "novo workflow/tool somente leitura (query, list, summary)"
    required_refs: [add-workflow-tool.md, state-as-type.md]
    optional_refs: [thread-run-runtime.md, rules-checklist.md]
    forbidden_refs: [write-guard.md]

  add-write-workflow:
    trigger: "novo workflow/tool de escrita (record, create, update, delete, configure)"
    required_refs: [add-workflow-tool.md, write-guard.md, state-as-type.md]
    optional_refs: [pending-step.md, thread-run-runtime.md, rules-checklist.md]

  add-outcome-or-kind:
    trigger: "novo ToolOutcome, intent.Kind, RunStatus, AwaitingKind ou TransactionKind"
    required_refs: [state-as-type.md]
    optional_refs: [add-workflow-tool.md, rules-checklist.md]

  add-pending-step:
    trigger: "nova clarificação / suspend-resume / Draft"
    required_refs: [pending-step.md, state-as-type.md]
    optional_refs: [parse-llm-boundary.md, rules-checklist.md]

  runtime-thread-run:
    trigger: "ciclo Thread→Run, gateways, métricas, AgentRuntime"
    required_refs: [thread-run-runtime.md]
    optional_refs: [state-as-type.md, rules-checklist.md]

  parse-llm:
    trigger: "ParseInbound, system prompt, working memory, fallback/onboarding LLM"
    required_refs: [parse-llm-boundary.md]
    optional_refs: [core-concepts.md, rules-checklist.md]

  wiring:
    trigger: "DI manual em module.go, registrar workflow/registry"
    required_refs: [add-workflow-tool.md]
    optional_refs: [thread-run-runtime.md, write-guard.md]

  validate:
    trigger: "verificar mudança antes do merge"
    required_refs: [rules-checklist.md]
    optional_refs: []
