# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Orquestrador fino. Toda a logica fica isolada em taskfiles/ para nao
# conflitar com o codigo-fonte da aplicacao (cmd/, internal/, src/...).

includes:
  build:
    taskfile: ./taskfiles/build.yml
  test:
    taskfile: ./taskfiles/test.yml
  lint:
    taskfile: ./taskfiles/lint.yml
  security:
    taskfile: ./taskfiles/security.yml
  mocks:
    taskfile: ./taskfiles/mocks.yml
  migrate:
    taskfile: ./taskfiles/migrate.yml
  ci:
    taskfile: ./taskfiles/ci.yml
  local:
    taskfile: ./taskfiles/local.yml
  ngrok:
    taskfile: ./taskfiles/ngrok.yml
  smoke:
    taskfile: ./taskfiles/smoke.yml

silent: true

vars:
  APP_NAME: '{{.APP_NAME | default "mecontrola"}}'
  BIN_DIR: '{{.BIN_DIR | default "bin"}}'
  TASK_VERSION: 3.51.1

tasks:
  default:
    desc: Lista todas as tarefas disponiveis.
    cmds:
      - task --list-all

  setup:
    desc: Instala pre-commit hooks, gitsign e ferramentas pinadas.
    cmds:
      - echo "==> Instalando ferramentas pinadas..."
      - cmd: pip3 install pre-commit --quiet || pip install pre-commit --quiet
        ignore_error: true
      - cmd: brew install gitsign 2>/dev/null || go install github.com/sigstore/gitsign@latest 2>/dev/null || true
        platforms: [darwin]
      - cmd: go install github.com/sigstore/gitsign@latest 2>/dev/null || true
        platforms: [linux]
      - echo "==> Instalando pre-commit hooks..."
      - pre-commit install --install-hooks
      - pre-commit install --hook-type commit-msg
      - echo "==> Configurando gitsign para assinatura de commits..."
      - git config gpg.format x509
      - git config gpg.x509.program gitsign
      - git config commit.gpgsign true
      - echo "==> Setup concluido com sucesso!"

  run:
    desc: Compila e executa o servidor da aplicacao localmente.
    deps: [build:build]
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}} server'

  check:
    desc: Validacao local rapida (lint + testes unitarios + seguranca).
    cmds:
      - task: lint:run
      - task: test:unit
      - task: security:vulncheck

  bench:outbox:
    desc: Executa benchmarks do pacote outbox e captura baseline em docs/benchmarks/outbox-baseline.md.
    cmds:
      - go test -bench=BenchmarkPublisher -benchmem -count=5 -run=^$ ./internal/platform/outbox/...

  auth:smoke:
    desc: |
      Smoke test do webhook auth em staging (RF-30).
      Envia payload valido com HMAC-SHA256 real e verifica HTTP 200.
      Com --db, valida linha em auth_events nos ultimos 10 segundos.
      Requer: WEBHOOK_URL, META_APP_SECRET, SMOKE_WA. DB_URL e opcional.
    vars:
      WEBHOOK_URL: '{{.WEBHOOK_URL | default (env "WEBHOOK_URL")}}'
      META_APP_SECRET: '{{.META_APP_SECRET | default (env "META_APP_SECRET")}}'
      SMOKE_WA: '{{.SMOKE_WA | default (env "SMOKE_WA")}}'
      DB_URL: '{{.DB_URL | default (env "DB_URL")}}'
    preconditions:
      - sh: '[ -n "{{.WEBHOOK_URL}}" ]'
        msg: "WEBHOOK_URL (ou env WEBHOOK_URL) e obrigatorio"
      - sh: '[ -n "{{.META_APP_SECRET}}" ]'
        msg: "META_APP_SECRET (ou env META_APP_SECRET) e obrigatorio"
      - sh: '[ -n "{{.SMOKE_WA}}" ]'
        msg: "SMOKE_WA (ou env SMOKE_WA) e obrigatorio"
    cmds:
      - |
        BASE=$(echo "{{.WEBHOOK_URL}}" | sed -E 's|(https?://[^/]+).*|\1|')
        echo "==> Aguardando servico em ${BASE}/health..."
        curl -fsS --retry 10 --retry-delay 3 --retry-all-errors --max-time 5 --connect-timeout 2 "${BASE}/health"
        echo "==> Servico pronto"
      - go run ./scripts/smoke/auth_webhook --url "{{.WEBHOOK_URL}}" --secret "{{.META_APP_SECRET}}" --user-wa "{{.SMOKE_WA}}" --db "{{.DB_URL}}"

  mvp:smoke:
    desc: |
      Smoke E2E local: Kiwify webhook -> SendActivationEmail -> Mailpit -> /tokens/<token>/state.
      Pre-req: 'task local:up' rodando (postgres+mailpit+server+worker). Variaveis lidas do .env:
      KIWIFY_WEBHOOK_SECRET, KIWIFY_PRODUCT_ID_MONTHLY. Opcionais: KIWIFY_URL, STATE_URL_BASE,
      MAILPIT_API, WAIT_MAX_SECONDS.
    cmds:
      - bash scripts/smoke/mvp_e2e.sh

  mvp:telegram:prepare:
    desc: |
      Sobe stack completo para E2E Telegram: build/vet, docker compose (postgres+mailpit+otel),
      migrate, server+worker em background, ngrok detached, setWebhook Telegram. Le .env.
      Pre-req humano: bot criado em @BotFather + .env preenchido com TELEGRAM_BOT_*.
    cmds:
      - bash scripts/smoke/telegram_prepare.sh

  mvp:telegram:drive:
    desc: |
      Dirige fluxo E2E Telegram: dispara Kiwify webhook, polla email no Mailpit, extrai token,
      pega deep link, prompts humanos minimos (clicar link + 4 msgs no Telegram), cria card+invoice
      via SQL, dispara ThresholdAlertsJob, valida budget_alerts_sent.notified_at. Pre-req:
      'task mvp:telegram:prepare' rodando.
    cmds:
      - bash scripts/smoke/telegram_drive.sh

  alerts:run-once:
    desc: |
      Dispara ThresholdAlertsJob 1x via worker efemero (cron acelerado @every 2s) e mata apos
      timeout. Util para validar Fase 12 do playbook Telegram sem esperar @hourly. Forca
      BUDGETS_THRESHOLD_ALERTS_MODE=job + BUDGETS_THRESHOLD_ALERTS_CRON='@every 2s'.
    cmds:
      - |
        set -euo pipefail
        echo "==> alerts:run-once : iniciando worker efemero por 8s..."
        BUDGETS_THRESHOLD_ALERTS_MODE=job \
        BUDGETS_THRESHOLD_ALERTS_CRON='@every 2s' \
          timeout 8 go run ./cmd/worker || true
        echo "==> alerts:run-once : worker encerrado. Conferir budget_alerts_sent."

  onboarding:smoke:
    desc: |
      Smoke test do fluxo ATIVAR end-to-end com HMAC real (staging).
      Requer: META_APP_SECRET, STAGING_WEBHOOK_URL, STAGING_PHONE_FROM env vars.
      Envia um webhook POST simulado com assinatura HMAC-SHA256 valida e verifica
      que o endpoint retorna 200 OK (sem regressao no pipeline de onboarding).
    cmds:
      - |
        : "${META_APP_SECRET:?META_APP_SECRET is required}"
        : "${STAGING_WEBHOOK_URL:?STAGING_WEBHOOK_URL is required}"
        PAYLOAD='{"object":"whatsapp_business_account","entry":[{"id":"smoke-entry","changes":[{"field":"messages","value":{"messaging_product":"whatsapp","messages":[{"from":"5511900000001","id":"wamid-smoke-'$(date +%s)'","timestamp":"'$(date +%s)'","type":"text","text":{"body":"SMOKE TEST"}}]}}]}]}'
        SIG="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$META_APP_SECRET" | awk '{print $2}')"
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$STAGING_WEBHOOK_URL/webhooks/whatsapp" \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: $SIG" \
          -d "$PAYLOAD")
        if [ "$STATUS" != "200" ]; then
          echo "FAIL: webhook retornou HTTP $STATUS (esperado 200)"
          exit 1
        fi
        echo "PASS: onboarding smoke OK (HTTP $STATUS)"

  card:lint:
    desc: Executa golangci-lint no escopo do modulo card (inclui regra forbidigo anti-PCI).
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint ausente. Instale: https://golangci-lint.run/welcome/install/"
    cmds:
      - golangci-lint run ./internal/card/... ./internal/platform/idempotency/...

  card:test:
    desc: Executa testes unitarios do modulo card com detector de corrida.
    cmds:
      - go test -race -count=1 -short ./internal/card/... ./internal/platform/idempotency/...

  card:integration:
    desc: Executa testes de integracao do modulo card (requer Docker para testcontainers).
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker nao esta disponivel; suba as dependencias antes dos testes de integracao."
    cmds:
      - go test -race -count=1 -tags=integration ./internal/card/... ./internal/platform/idempotency/...

  card:audit:
    desc: Auditoria R0-R7 do modulo card — gates de init, panic, clock, interface-assertion e zero-comentarios.
    cmds:
      - |
        echo "==> [R0] Verificando ausencia de init()..."
        if grep -rn --include="*.go" --exclude="*_test.go" '^func init()' internal/card/ internal/platform/idempotency/; then
          echo "FAIL: init() encontrado — violacao R0"
          exit 1
        fi
        echo "PASS R0: sem init()"
      - |
        echo "==> [R5.12] Verificando ausencia de panic em producao..."
        if grep -rn 'panic(' --include="*.go" --exclude-dir=mocks --exclude="*_test.go" internal/card/ internal/platform/idempotency/; then
          echo "FAIL: panic() encontrado em producao — violacao R5.12"
          exit 1
        fi
        echo "PASS R5.12: sem panic em producao"
      - |
        echo "==> [R6.7] Verificando ausencia de clock.Clock..."
        if grep -rn 'clock\.Clock' --include="*.go" --exclude="*_test.go" internal/card/; then
          echo "FAIL: clock.Clock encontrado — violacao R6.7"
          exit 1
        fi
        echo "PASS R6.7: sem clock.Clock"
      - |
        echo "==> [R6.4] Verificando ausencia de var _ Interface = (*Type)(nil)..."
        if grep -rn 'var _ .* = (' --include="*.go" --exclude="*_test.go" internal/card/; then
          echo "FAIL: assertiva de interface encontrada — violacao R6.4"
          exit 1
        fi
        echo "PASS R6.4: sem assertiva de interface"
      - |
        echo "==> [R-ADAPTER-001.1] Verificando ausencia de comentarios em producao..."
        if grep -rn --include="*.go" --exclude-dir=mocks --exclude="*.pb.go" --exclude="*_test.go" \
          "^[[:space:]]*//" internal/card/ internal/platform/idempotency/ \
          | grep -Ev "(//go:|//nolint:|// Code generated)"; then
          echo "FAIL: comentarios proibidos encontrados — violacao R-ADAPTER-001.1"
          exit 1
        fi
        echo "PASS R-ADAPTER-001.1: zero comentarios em producao"
      - |
        echo "==> [R-ADAPTER-001.2] Verificando ausencia de SQL direto em adapters..."
        ADAPTER_DIRS=""
        for dir in \
          "internal/card/infrastructure/http/server/handlers" \
          "internal/card/infrastructure/messaging/database/consumers" \
          "internal/card/infrastructure/messaging/database/producers" \
          "internal/card/infrastructure/jobs/handlers"; do
          if [ -d "$dir" ]; then ADAPTER_DIRS="$ADAPTER_DIRS $dir"; fi
        done
        if [ -n "$ADAPTER_DIRS" ] && grep -rn --include="*.go" --exclude-dir=mocks --exclude="*_test.go" \
          "QueryContext\|ExecContext\|db\.Query\|tx\.Exec\|db\.Exec" \
          $ADAPTER_DIRS; then
          echo "FAIL: SQL direto em adapter — violacao R-ADAPTER-001.2"
          exit 1
        fi
        echo "PASS R-ADAPTER-001.2: sem SQL direto em adapters"
      - |
        echo "==> [RF-16] Verificando ausencia de PAN/CVV/CVC/track/PIN em internal/card..."
        if grep -rn --include="*.go" --exclude="*_test.go" -E '\b(PAN|pan_number|cardholder_pan|primary_account_number|cvv|cvv2|cvc|cvc2|cvv_code|cvc_code|track1|track2|track_data|magstripe|card_number|cardNumber|cc_number|ccNumber|pin_block|pinBlock|cardholder_pin|cardholderPin)\b' internal/card/; then
          echo "FAIL: PAN/CVV/CVC/track/PIN encontrado — violacao RF-16 (nao-PCI)"
          exit 1
        fi
        echo "PASS RF-16: sem dados sensiveis PCI em internal/card"
      - echo "==> card:audit concluido com SUCESSO"
