# pgbouncer.ini — referência para instalação host-based (não-Docker).
# Em Docker: use bitnami/pgbouncer com env vars (ver compose.yml).
# pgbouncer NÃO expande ${} — use valores literais neste arquivo.

[databases]
mecontrola_db = host=127.0.0.1 port=5432 dbname=mecontrola_db user=mecontrola

[pgbouncer]
listen_addr           = 0.0.0.0
listen_port           = 6432

auth_type             = scram-sha-256
auth_file             = /etc/pgbouncer/userlist.txt

pool_mode             = transaction
max_client_conn       = 300
default_pool_size     = 20
min_pool_size         = 5
reserve_pool_size     = 5
reserve_pool_timeout  = 3.0
max_db_connections    = 30
max_user_connections  = 0

server_idle_timeout   = 600
server_lifetime       = 3600
server_connect_timeout = 15
server_login_retry    = 15
client_idle_timeout   = 0
query_timeout         = 0
query_wait_timeout    = 120

ignore_startup_parameters = extra_float_digits,search_path

log_connections       = 0
log_disconnections    = 0
log_pooler_errors     = 1
stats_period          = 60

admin_users           = mecontrola
stats_users           = mecontrola
