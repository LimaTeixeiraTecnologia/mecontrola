apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-mecontrola
    receivers:
      - uid: telegram-mecontrola-receiver
        type: telegram
        settings:
          bottoken: ${ALERT_TELEGRAM_BOT_TOKEN}
          chatid: "${ALERT_TELEGRAM_CHAT_ID}"
          parse_mode: HTML
          disable_web_page_preview: true
          message: |
            {{ template "mc.telegram.message" . }}

policies:
  - orgId: 1
    receiver: telegram-mecontrola
    group_by: ['alertname', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: telegram-mecontrola
        matchers:
          - severity =~ "critical|warning"

templates:
  - name: mc.telegram.message
    template: |
      {{ define "mc.telegram.message" -}}
      {{- range .Alerts.Firing }}
      {{ template "mc.telegram.firing" . }}
      {{- end }}
      {{- range .Alerts.Resolved }}
      {{ template "mc.telegram.resolved" . }}
      {{- end }}
      {{- end }}

      {{ define "mc.telegram.firing" -}}
      🚨 <b>Disparado</b>: <b>{{ .Labels.alertname }}</b>
      <b>Severidade:</b> {{ template "mc.telegram.severity" . }}
      <b>Resumo:</b> {{ .Annotations.summary }}
      <b>Contexto:</b> {{ .Annotations.description }}
      <b>Desde:</b> {{ .StartsAt.Format "02/01 15:04 UTC" }}

      {{- end }}

      {{ define "mc.telegram.resolved" -}}
      ✅ <b>Resolvido</b>: <b>{{ .Labels.alertname }}</b>
      <b>Severidade:</b> {{ template "mc.telegram.severity" . }}
      <b>Resumo:</b> {{ .Annotations.summary }}
      <b>Contexto:</b> {{ .Annotations.description }}
      <b>Encerrado:</b> {{ .EndsAt.Format "02/01 15:04 UTC" }}

      {{- end }}

      {{ define "mc.telegram.severity" -}}
      {{- if eq .Labels.severity "critical" -}}Critica
      {{- else if eq .Labels.severity "warning" -}}Atencao
      {{- else if .Labels.severity -}}{{ .Labels.severity }}
      {{- else -}}Nao informada
      {{- end -}}
      {{- end }}
