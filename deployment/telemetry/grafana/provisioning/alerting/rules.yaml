apiVersion: 1

groups:
  - orgId: 1
    name: tecnico
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-api-down
        title: API sem métricas
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Sem métricas HTTP da API por mais de 5 minutos."
          description: "A API provavelmente caiu, travou ou parou de exportar métricas. Verifique processo, container e logs recentes."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'absent(http_server_request_active{job="mecontrola-api"})'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-api-5xx
        title: Erro 5xx alto na API
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Taxa de respostas 5xx da API acima de 5% por 5 minutos."
          description: "A API esta respondendo com erro em volume anormal. Verifique endpoints com falha, traces e logs recentes."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 * sum(rate(http_server_request_count_total{job="mecontrola-api", http_response_status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_server_request_count_total{job="mecontrola-api"}[5m])), 1)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [5] }

      - uid: mc-api-latency-p99
        title: Latência p99 alta na API
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "p99 de latência da API acima de 1 segundo por 10 minutos."
          description: "Ha lentidao sustentada nas requisicoes mais demoradas. Verifique pressao em banco, dependencias externas e endpoints mais lentos."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{job="mecontrola-api"}[5m])))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [1] }

      - uid: mc-db-pool-wait
        title: Espera por conexão no pool do Postgres
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Pool do Postgres com mais de 1 espera por segundo por 5 minutos."
          description: "A aplicacao esta esperando conexao do banco com frequencia. Verifique saturacao do pool, queries lentas e concorrencia."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(rate(database_pool_wait_count_total{job=~"mecontrola-.+"}[5m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [1] }

  - orgId: 1
    name: infraestrutura
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-disk-usage-high
        title: Uso de disco alto
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Uso de disco acima de 80% por 5 minutos."
          description: "Disco da VPS está próximo da saturação. Verifique logs, métricas e traces; considere housekeeping ou expansão de volume."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} * 100) / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [80] }

      - uid: mc-cpu-usage-high
        title: Uso de CPU alto
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Uso de CPU acima de 70% por 5 minutos."
          description: "CPU da VPS sustentada acima do threshold. Avalie se há processo runaway ou se é hora de upgrade de VPS."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [70] }

      - uid: mc-memory-usage-high
        title: Uso de RAM alto
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Uso de RAM acima de 80% por 5 minutos."
          description: "RAM da VPS próxima da saturação. Verifique containers com alto consumo e risco de OOM kill."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 * (1 - ((node_memory_MemAvailable_bytes or node_memory_MemFree_bytes) / node_memory_MemTotal_bytes))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [80] }

      - uid: mc-wal-lag-high
        title: WAL lag alto no PostgreSQL
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "WAL lag acima de 15 minutos no PostgreSQL."
          description: "pgBackRest ou arquivamento de WAL está atrasado. Risco de PITR comprometido; verifique conectividade S3 e processo de archive-push."
        data:
          - refId: A
            relativeTimeRange: { from: 1200, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '(
  pg_stat_archiver_last_archive_age > 900
  and on()
  (
    rate(pg_stat_database_xact_commit[10m]) > 0
    or
    rate(pg_stat_database_blks_written[10m]) > 0
  )
)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [900] }

      - uid: mc-outbox-queue-high
        title: Fila de jobs outbox alta
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Fila de jobs outbox acima de 1000 por 5 minutos."
          description: "Workers não estão acompanhando a produção de eventos. Verifique saúde dos workers, latência de handlers e disponibilidade de banco."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(outbox_pending_jobs)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [1000] }

  - orgId: 1
    name: negocio
    folder: MeControla Alerts
    interval: 5m
    rules:
      - uid: mc-onboarding-unconsumed
        title: Tokens pagos sem consumo no onboarding
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Tres ou mais tokens pagos seguem sem ativacao por mais de 15 minutos."
          description: "Ha acumulacao sustentada de clientes pagos sem ativacao. Verifique fluxo de ativacao, entrega de email, WhatsApp, eventos outbox e consumo de tokens. Casos isolados ficam no dashboard sem notificar."
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'max(onboarding_tokens_paid_unconsumed_overdue)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [2] }

  - orgId: 1
    name: plataforma
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-collector-export-fail
        title: Falha na exportação de métricas do collector
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Collector falhando ao exportar metricas por 5 minutos."
          description: "O otelcol nao esta conseguindo enviar metricas ao Prometheus de forma continua. Verifique conectividade, filas internas e logs do collector."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(rate(otelcol_exporter_send_failed_metric_points_total[5m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

  - orgId: 1
    name: agente
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-agent-parse-unknown
        title: Parser de intent caindo em unknown
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Parser de intent caindo em unknown/fallback acima de 30%."
          description: "Modelo (primario ou fallback) provavelmente parou de honrar response_format json_schema. Ver runbook docs/runbooks/agent-parser-policy.md."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 * sum(rate(agent_intent_parsed_total{job="mecontrola-api", outcome=~"provider_error|fallback_invalid_json|fallback_missing_kind|fallback_domain_invariant"}[10m])) / clamp_min(sum(rate(agent_intent_parsed_total{job="mecontrola-api"}[10m])), 1)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [30] }

      - uid: mc-agent-fallback-exhausted
        title: Cadeia de fallback de LLM esgotada
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Cadeia de fallback de LLM esgotada (todos os providers falharam)."
          description: "Nenhum provider respondeu. Verifique OPENROUTER_API_KEY, creditos, circuit breaker aberto e status do OpenRouter."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(increase(agent_llm_fallback_exhausted_total{job="mecontrola-api"}[10m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-agent-llm-error-rate
        title: Taxa de erro dos providers LLM alta
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Taxa de erro dos providers LLM acima de 20%."
          description: "Ver reason em agent_llm_provider_errors_total (timeout/rate_limited/upstream_5xx/no_credit). Verifique disponibilidade do OpenRouter."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 * sum(rate(agent_llm_provider_errors_total{job="mecontrola-api"}[10m])) / clamp_min(sum(rate(agent_llm_provider_call_total{job="mecontrola-api"}[10m])), 1)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [20] }

      - uid: mc-agent-policy-block-rate
        title: Politica de confianca bloqueando muitas escritas
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Politica de confianca bloqueando acima de 25% das escritas."
          description: "Pode indicar degradacao do modelo (confidence baixa) ou AGENT_POLICY_MIN_CONFIDENCE mal calibrado. Ver agent_intent_confidence_histogram."
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 * sum(rate(agent_policy_blocks_total{job="mecontrola-api"}[15m])) / clamp_min(sum(rate(agent_intent_routed_total{job="mecontrola-api"}[15m])), 1)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [25] }

      - uid: mc-agent-idempotency-replay
        title: Replays idempotentes acima do esperado
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Replays idempotentes acima do esperado."
          description: "Reentrega de webhook ou tentativa de duplicacao elevada. Confirme que o guard evita dupla execucao; investigue origem das mensagens repetidas."
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(rate(agent_idempotency_replay_total{job="mecontrola-api"}[5m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [1] }

  - orgId: 1
    name: pool
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-pgbouncer-pool-saturation
        title: Saturacao de pool pgBouncer
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Conexoes reais ao Postgres acima de 80% do MAX_DB_CONNECTIONS (30)."
          description: "pgBouncer esta proximo do teto de conexoes reais. Pressao de pool sustentada pode causar timeouts de query. Verifique DB_MAX_CONNS dos processos, background jobs e queries lentas que seguram conexoes."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'pg_stat_database_numbackends{datname="mecontrola_db"}'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [24] }

      - uid: mc-pgbouncer-client-queue
        title: Espera no pool da aplicacao (app -> pgbouncer) alta
        condition: C
        for: 3m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Pool database/sql da aplicacao com espera acima de 2 por segundo por 3 minutos."
          description: "Metrica database_pool_wait_count_total mede o pool database/sql da propria aplicacao (app -> pgbouncer), NAO o cl_waiting interno do pgBouncer. Processos da aplicacao aguardam conexao com frequencia elevada. Verifique DB_MAX_CONNS/pool da app, DEFAULT_POOL_SIZE do pgBouncer e queries longas. Gatilho de upgrade: pool wait > 5/s sustentado por 10 min."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(rate(database_pool_wait_count_total{job=~"mecontrola-.+"}[5m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [2] }

  - orgId: 1
    name: backup
    folder: MeControla Alerts
    interval: 5m
    rules:
      - uid: mc-backup-full-stale
        title: Backup full pgBackRest atrasado ou desatualizado
        condition: C
        for: 1h
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Backup full semanal esperado atrasado ou ultimo full com mais de 8 dias."
          description: "O full semanal nao foi concluido apos a janela de tolerancia, ou o ultimo full esta desatualizado. PITR comprometido. Verifique cron de backup full, conectividade S3 e logs do pgBackRest. Runbook: deployment/runbooks/restore-pitr.md."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '(max(pgbackrest_backup_expected_late{type="full"}) + max(pgbackrest_backup_age_seconds{type="full"} > bool 691200)) * on() (max(pgbackrest_info_failed) == bool 0)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-backup-diff-stale
        title: Backup diff pgBackRest esperado atrasado
        condition: C
        for: 30m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Backup diff esperado do pgBackRest esta atrasado."
          description: "O diff esperado pelo calendario nao foi concluido apos a janela de tolerancia. Domingo executa full e nao deve gerar falso positivo de diff. Verifique timer/cron de backup diff e logs do pgBackRest."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'max(pgbackrest_backup_expected_late{type="diff"})'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-backup-archive-push-failed
        title: Archive-push do pgBackRest falhando
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "pgBackRest check detectou falha de archive-push."
          description: "O archive-push de WAL esta falhando (pgbackrest check retornou erro). PITR comprometido; WAL nao esta chegando ao repositorio. Verifique conectividade S3, credenciais e processo de archive_command. Runbook: deployment/runbooks/restore-pitr.md."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'max(pgbackrest_archive_push_failed)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-backup-info-failed
        title: Coleta pgBackRest info falhando
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Exporter nao conseguiu executar pgbackrest info."
          description: "A idade dos backups pode estar indisponivel ou com sentinela. Verifique container postgres, stanza, credenciais e logs do pgBackRest."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'max(pgbackrest_info_failed)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-backup-metrics-stale
        title: Metricas pgBackRest desatualizadas
        condition: C
        for: 15m
        noDataState: Alerting
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Textfile collector sem metricas pgBackRest recentes."
          description: "A ultima coleta pgBackRest tem mais de 1 hora ou a serie esta ausente. Verifique pgbackrest-metrics.timer/cron, node_exporter e permissao do textfile collector."
        data:
          - refId: A
            relativeTimeRange: { from: 7200, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'max(time() - pgbackrest_metrics_collected_timestamp_seconds)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [3600] }

  - orgId: 1
    name: versao
    folder: MeControla Alerts
    interval: 1h
    rules:
      - uid: mc-version-skew
        title: Drift de versao em producao
        condition: C
        for: 0m
        noDataState: NoData
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Uma unica versao de mecontrola-server observada nas ultimas 25 horas."
          description: "Nenhuma nova service_version apareceu em target_info nas ultimas 25h: producao parada na mesma versao (sem redeploy). Verifique drift entre main e a imagem em execucao. Runbook: deployment/runbooks/deploy.md"
        data:
          - refId: A
            relativeTimeRange: { from: 93600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'count(count by (service_version) (last_over_time(target_info{job="mecontrola-api"}[25h])))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: lt, params: [2] }

  - orgId: 1
    name: disco
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-disk-low-bytes
        title: Disco com menos de 10 GiB livres
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Disco da VPS com menos de 10 GiB livres por 5 minutos."
          description: "Espaco absoluto em disco critico. Execute docker-prune.sh imediatamente e verifique logs, build cache e imagens antigas. Referencia: deployment/scripts/docker-prune.sh."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: lt, params: [10737418240] }
