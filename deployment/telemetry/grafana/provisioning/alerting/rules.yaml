apiVersion: 1

groups:
  - orgId: 1
    name: tecnico
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-api-down
        title: API sem métricas
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Sem métricas HTTP da API por mais de 5 minutos."
          description: "A API provavelmente caiu, travou ou parou de exportar métricas. Verifique processo, container e logs recentes."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'absent(http_server_request_active{job="mecontrola-api"})'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }

      - uid: mc-api-5xx
        title: Erro 5xx alto na API
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Taxa de respostas 5xx da API acima de 5% por 5 minutos."
          description: "A API esta respondendo com erro em volume anormal. Verifique endpoints com falha, traces e logs recentes."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: '100 * sum(rate(http_server_request_count_total{job="mecontrola-api", http_response_status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_server_request_count_total{job="mecontrola-api"}[5m])), 1)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [5] }

      - uid: mc-api-latency-p99
        title: Latência p99 alta na API
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "p99 de latência da API acima de 1 segundo por 10 minutos."
          description: "Ha lentidao sustentada nas requisicoes mais demoradas. Verifique pressao em banco, dependencias externas e endpoints mais lentos."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{job="mecontrola-api"}[5m])))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [1] }

      - uid: mc-db-pool-wait
        title: Espera por conexão no pool do Postgres
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Pool do Postgres com mais de 1 espera por segundo por 5 minutos."
          description: "A aplicacao esta esperando conexao do banco com frequencia. Verifique saturacao do pool, queries lentas e concorrencia."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(rate(database_pool_wait_count_total{job=~"mecontrola-.+"}[5m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [1] }

  - orgId: 1
    name: negocio
    folder: MeControla Alerts
    interval: 5m
    rules:
      - uid: mc-onboarding-unconsumed
        title: Tokens pagos sem consumo no onboarding
        condition: C
        for: 15m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning }
        annotations:
          summary: "Mais de 25% dos tokens pagos seguem sem ativacao por 15 minutos."
          description: "Ha clientes que pagaram, mas ainda nao ativaram ou nao consumiram o onboarding como esperado. Verifique fluxo de ativacao, entrega de email e consumo de tokens."
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'max(onboarding_tokens_paid_unconsumed_ratio)'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0.25] }

  - orgId: 1
    name: plataforma
    folder: MeControla Alerts
    interval: 1m
    rules:
      - uid: mc-collector-export-fail
        title: Falha na exportação de métricas do collector
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels: { severity: critical }
        annotations:
          summary: "Collector falhando ao exportar metricas por 5 minutos."
          description: "O otelcol nao esta conseguindo enviar metricas ao Prometheus de forma continua. Verifique conectividade, filas internas e logs do collector."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: 'sum(rate(otelcol_exporter_send_failed_metric_points_total[5m]))'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - type: query
                  reducer: { type: last }
                  operator: { type: and }
                  query: { params: [C] }
                  evaluator: { type: gt, params: [0] }
