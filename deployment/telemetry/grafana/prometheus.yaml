global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: opentelemetry-collector
    scrape_interval: 5s
    static_configs:
      - targets: ['127.0.0.1:8888']

  - job_name: postgres-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: node-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']
