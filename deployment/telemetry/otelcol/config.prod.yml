receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 512
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
  otlphttp/loki:
    endpoint: ${LOKI_URL}
    headers:
      X-Scope-OrgID: mecontrola
    auth:
      authenticator: basicauth/loki
    tls:
      insecure: false

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /ready
  basicauth/loki:
    client_auth:
      username: ${LOKI_USER_ID}
      password: ${LOKI_API_KEY}

service:
  extensions: [health_check, basicauth/loki]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
