# postgresql.conf — tuning para VPS 8 GB RAM / NVMe SSD (pgtune mixed profile)
# Valores calculados via https://pgtune.leopard.in.ua (DB Version: 16, Mixed, 8GB, SSD)
# Injetar via Docker volume: -v ./deployment/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
# E iniciar postgres com: postgres -c config_file=/etc/postgresql/postgresql.conf

# ---------------------------------------------------------------------------
# Memória
# ---------------------------------------------------------------------------
shared_buffers                  = 2GB
effective_cache_size            = 6GB
work_mem                        = 16MB
maintenance_work_mem            = 512MB
huge_pages                      = off
temp_file_limit                 = 4GB

# ---------------------------------------------------------------------------
# I/O — NVMe SSD
# ---------------------------------------------------------------------------
random_page_cost                = 1.1
effective_io_concurrency        = 200
seq_page_cost                   = 1.0

# ---------------------------------------------------------------------------
# Checkpoint e WAL
# ---------------------------------------------------------------------------
wal_level                       = replica
archive_mode                    = off
# archive_mode e archive_command são ativados pelo pgbackrest-setup.sh via ALTER SYSTEM.
# Requer POSTGRES_IMAGE=mecontrola-postgres (Dockerfile.postgres com pgBackRest).
max_wal_size                    = 2GB
min_wal_size                    = 256MB
checkpoint_completion_target    = 0.9
wal_compression                 = on
wal_buffers                     = 64MB

# ---------------------------------------------------------------------------
# Conexões
# ---------------------------------------------------------------------------
listen_addresses                = '*'
max_connections                 = 100
superuser_reserved_connections  = 3

# ---------------------------------------------------------------------------
# Background writer
# ---------------------------------------------------------------------------
bgwriter_lru_maxpages           = 100
bgwriter_delay                  = 200ms
bgwriter_lru_multiplier         = 2.0

# ---------------------------------------------------------------------------
# Paralelismo
# ---------------------------------------------------------------------------
max_parallel_workers_per_gather = 2
max_parallel_workers            = 4
max_parallel_maintenance_workers = 2

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_destination                 = 'stderr'
logging_collector               = off
log_connections                 = on
log_disconnections              = off
log_min_duration_statement      = 200
log_checkpoints                 = on
log_lock_waits                  = on
log_temp_files                  = 0
log_line_prefix                 = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
log_timezone                    = 'UTC'
log_autovacuum_min_duration     = 250ms

# ---------------------------------------------------------------------------
# Autovacuum
# ---------------------------------------------------------------------------
autovacuum                      = on
autovacuum_max_workers          = 3
autovacuum_naptime              = 1min
autovacuum_vacuum_scale_factor  = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay    = 2ms

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
timezone                        = 'UTC'
lc_messages                     = 'en_US.utf8'
default_statistics_target       = 100
idle_in_transaction_session_timeout = 30s
lock_timeout                    = 10s
statement_timeout               = 0
