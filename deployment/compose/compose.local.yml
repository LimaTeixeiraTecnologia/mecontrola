name: mecontrola

# Overrides locais — desenvolvimento e testes de integração.
# Uso: docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.local.yml up -d

services:
  postgres:
    ports:
      # Expõe Postgres para ferramentas locais (DBeaver, psql, etc.)
      # 0.0.0.0 necessário no macOS com Docker Desktop (VM não propaga 127.0.0.1)
      - "5432:5432"

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  otel-lgtm:
    image: grafana/otel-lgtm:0.7.5
    environment:
      GF_SECURITY_ADMIN_USER: ${OTEL_LGTM_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${OTEL_LGTM_ADMIN_PASSWORD:-admin@dev}
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ../telemetry/grafana/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - otel-lgtm-data:/otel-lgtm/grafana/data
    networks:
      - backend

  migrate:
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      DB_HOST: postgres
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
    depends_on:
      postgres:
        condition: service_healthy
      otel-lgtm:
        condition: service_started

  server:
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      DB_HOST: postgres
      ENVIRONMENT: local
      LOG_LEVEL: debug
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
    depends_on:
      postgres:
        condition: service_healthy
      otel-lgtm:
        condition: service_started

  worker:
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      DB_HOST: postgres
      ENVIRONMENT: local
      LOG_LEVEL: debug
      LOG_FORMAT: json
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
    depends_on:
      postgres:
        condition: service_healthy
      otel-lgtm:
        condition: service_started

  caddy:
    profiles: ["proxy"]
    # Caddy desabilitado por padrão no local; ative com --profile proxy

volumes:
  otel-lgtm-data:

networks:
  # Remove isolamento da rede interna para expor postgres ao host em dev local
  backend:
    internal: false
