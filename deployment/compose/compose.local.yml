name: mecontrola

# Overrides locais — desenvolvimento e testes de integração.
# Uso: docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.local.yml up -d

services:
  postgres:
    ports:
      # Expõe Postgres em loopback para ferramentas locais (DBeaver, psql, etc.)
      - "127.0.0.1:5432:5432"

  server:
    ports:
      # Acesso direto ao servidor sem Caddy
      - "127.0.0.1:8080:8080"
    environment:
      ENVIRONMENT: local
      LOG_LEVEL: debug
      LOG_FORMAT: json

  worker:
    environment:
      ENVIRONMENT: local
      LOG_LEVEL: debug
      LOG_FORMAT: json

  caddy:
    profiles: ["proxy"]
    # Caddy desabilitado por padrão no local; ative com --profile proxy
