version: "3.8"

# Stack de produção no Docker Swarm single-node.
# Arquivo canônico de produção e de paridade local com produção.
#
# Uso:
#   docker stack deploy -c deployment/compose/compose.swarm.yml mecontrola
#
# Requisitos:
#   - Docker Swarm inicializado no host de deploy.
#   - Imagem da aplicação já publicada com tag imutável em IMAGE_TAG.
#   - Arquivo deployment/config/prod.env presente no repositório (não contém secrets).
#   - Secrets criptografados em deployment/config/prod.secrets.env (SOPS + age).
#   - Para pgBackRest/PITR, usar POSTGRES_IMAGE=mecontrola-postgres:<tag>.
#
# Observação sobre ordem de startup:
#   Docker Swarm não honra `depends_on.condition` do Compose. A ordem
#   determinística (postgres → pgbouncer → migrate → server/worker → caddy)
#   é garantida pelos healthchecks e pelas políticas de restart: services
#   downstream falham e são reiniciados até os upstreams ficarem saudáveis.
#
# Segurança:
#   - Secrets da aplicação (server/worker/migrate) são montados via docker secret
#     em /run/secrets/<NOME> e lidos pelo código Go em produção.
#   - Não há .env na VPS. O CI descriptografa prod.secrets.env no runner efêmero,
#     cria/atualiza os docker secrets e renderiza o stack.
#   - Serviços de infra (postgres, pgbouncer, otel-lgtm) recebem secrets via
#     variáveis de ambiente injetadas pelo CI durante o render — esses containers
#     não suportam /run/secrets nativamente sem imagem customizada.

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"
    compress: "true"

x-default-deploy: &default-deploy
  replicas: 1
  update_config:
    parallelism: 1
    delay: 20s
    failure_action: pause
    order: stop-first
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

# Secrets disponibilizados para server/worker/migrate via /run/secrets/<NOME>.
x-app-secrets: &app-secrets
  - source: mecontrola_DB_PASSWORD
    target: DB_PASSWORD
    mode: 0400
  - source: mecontrola_META_ACCESS_TOKEN
    target: META_ACCESS_TOKEN
    mode: 0400
  - source: mecontrola_META_APP_SECRET
    target: META_APP_SECRET
    mode: 0400
  - source: mecontrola_META_APP_SECRET_NEXT
    target: META_APP_SECRET_NEXT
    mode: 0400
  - source: mecontrola_META_VERIFY_TOKEN
    target: META_VERIFY_TOKEN
    mode: 0400
  - source: mecontrola_KIWIFY_CLIENT_ID
    target: KIWIFY_CLIENT_ID
    mode: 0400
  - source: mecontrola_KIWIFY_CLIENT_SECRET
    target: KIWIFY_CLIENT_SECRET
    mode: 0400
  - source: mecontrola_KIWIFY_ACCOUNT_ID
    target: KIWIFY_ACCOUNT_ID
    mode: 0400
  - source: mecontrola_KIWIFY_WEBHOOK_SECRET
    target: KIWIFY_WEBHOOK_SECRET
    mode: 0400
  - source: mecontrola_KIWIFY_WEBHOOK_SECRET_NEXT
    target: KIWIFY_WEBHOOK_SECRET_NEXT
    mode: 0400
  - source: mecontrola_OPENROUTER_API_KEY
    target: OPENROUTER_API_KEY
    mode: 0400
  - source: mecontrola_ONBOARDING_TOKEN_ENCRYPTION_KEY
    target: ONBOARDING_TOKEN_ENCRYPTION_KEY
    mode: 0400
  - source: mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_CURRENT
    target: IDENTITY_GATEWAY_SHARED_SECRET_CURRENT
    mode: 0400
  - source: mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_NEXT
    target: IDENTITY_GATEWAY_SHARED_SECRET_NEXT
    mode: 0400
  - source: mecontrola_SMTP_USERNAME
    target: SMTP_USERNAME
    mode: 0400
  - source: mecontrola_SMTP_PASSWORD
    target: SMTP_PASSWORD
    mode: 0400
  - source: mecontrola_RESEND_API_KEY
    target: RESEND_API_KEY
    mode: 0400
  - source: mecontrola_META_PHONE_NUMBER_ID
    target: META_PHONE_NUMBER_ID
    mode: 0400
  - source: mecontrola_KIWIFY_PRODUCT_ID_MONTHLY
    target: KIWIFY_PRODUCT_ID_MONTHLY
    mode: 0400
  - source: mecontrola_KIWIFY_PRODUCT_ID_QUARTERLY
    target: KIWIFY_PRODUCT_ID_QUARTERLY
    mode: 0400
  - source: mecontrola_KIWIFY_PRODUCT_ID_ANNUAL
    target: KIWIFY_PRODUCT_ID_ANNUAL
    mode: 0400

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    env_file: ../config/prod.env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGBACKREST_REPO1_S3_KEY: ${PGBACKREST_S3_KEY:-}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PGBACKREST_S3_KEY_SECRET:-}
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - pgbackrest-repo:/pgbackrest
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mecontrola} -d ${DB_NAME:-mecontrola_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    env_file: ../config/prod.env
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "300"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      MAX_DB_CONNECTIONS: "30"
      SERVER_IDLE_TIMEOUT: "600"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
    networks:
      - backend
    depends_on:
      - postgres
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "pgrep pgbouncer || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    secrets:
      - source: mecontrola_DB_PASSWORD
        target: DB_PASSWORD
        mode: 0400

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    env_file: ../config/prod.env
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-mecontrola}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-mecontrola_db}?sslmode=disable"
    networks:
      - backend
    depends_on:
      - postgres
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["migrate"]
    env_file: ../config/prod.env
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    networks:
      - backend
    depends_on:
      - postgres
      - pgbouncer
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 20s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: none
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    logging: *default-logging
    secrets:
      - source: mecontrola_DB_PASSWORD
        target: DB_PASSWORD
        mode: 0400

  server-1:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["server"]
    env_file: ../config/prod.env
    environment:
      APP_MODE: server
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "1"
      OTEL_SERVICE_VERSION: ${IMAGE_TAG}
    networks:
      - backend
      - frontend
    depends_on:
      - postgres
      - pgbouncer
    stop_grace_period: 30s
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  server-2:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["server"]
    env_file: ../config/prod.env
    environment:
      APP_MODE: server
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "1"
      OTEL_SERVICE_VERSION: ${IMAGE_TAG}
    networks:
      - backend
      - frontend
    depends_on:
      - postgres
      - pgbouncer
    stop_grace_period: 30s
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size:64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  worker-1:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["worker"]
    env_file: ../config/prod.env
    environment:
      APP_MODE: worker
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "1"
      OTEL_SERVICE_VERSION: ${IMAGE_TAG}
    networks:
      - backend
    depends_on:
      - postgres
      - pgbouncer
    stop_grace_period: 30s
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size:64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  worker-2:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["worker"]
    env_file: ../config/prod.env
    environment:
      APP_MODE: worker
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "1"
      OTEL_SERVICE_VERSION: ${IMAGE_TAG}
    networks:
      - backend
    depends_on:
      - postgres
      - pgbouncer
    stop_grace_period: 30s
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size:64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    env_file: ../config/prod.env
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    depends_on:
      - server-1
      - server-2
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  otel-lgtm:
    image: grafana/otel-lgtm:0.7.5
    env_file: ../config/prod.env
    environment:
      OTEL_LGTM_ADMIN_PASSWORD: ${OTEL_LGTM_ADMIN_PASSWORD:?OTEL_LGTM_ADMIN_PASSWORD is required in production}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
    ports:
      - target: 3000
        published: 3000
        mode: host
    volumes:
      - ../telemetry/grafana/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ../telemetry/grafana/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
      - ../telemetry/grafana/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro
      - ../telemetry/grafana/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ../telemetry/grafana/run-prometheus.sh:/otel-lgtm/run-prometheus.sh:ro
      - ../dashboards:/etc/dashboards:ro
      - ../telemetry/grafana/provisioning/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/mecontrola.yaml:ro
      - ../telemetry/grafana/provisioning/alerting:/otel-lgtm/grafana/conf/provisioning/alerting:ro
      - ../telemetry/grafana/provisioning/alerting/contact-points.rendered.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/contact-points.yaml:ro
      - otel-lgtm-grafana:/otel-lgtm/grafana/data
      - otel-lgtm-prometheus:/data/prometheus
      - otel-lgtm-loki:/loki
      - otel-lgtm-tempo:/tmp/tempo
    networks:
      - backend
      - frontend
    depends_on:
      - postgres
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "1.0"
          memory: 1228M
        reservations:
          cpus: "0.10"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:13133/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  pg-tunnel:
    image: alpine/socat@sha256:b991911ea370c3b6409ade77746b81eb97bf715d87f7dde2a45832d6bee34872
    command: TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    ports:
      - target: 5432
        published: 15432
        protocol: tcp
        mode: host
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: "0.05"
          memory: 16M
        reservations:
          cpus: "0.01"
          memory: 8M
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

secrets:
  mecontrola_DB_PASSWORD:
    external: true
  mecontrola_META_ACCESS_TOKEN:
    external: true
  mecontrola_META_APP_SECRET:
    external: true
  mecontrola_META_APP_SECRET_NEXT:
    external: true
  mecontrola_META_VERIFY_TOKEN:
    external: true
  mecontrola_KIWIFY_CLIENT_ID:
    external: true
  mecontrola_KIWIFY_CLIENT_SECRET:
    external: true
  mecontrola_KIWIFY_ACCOUNT_ID:
    external: true
  mecontrola_KIWIFY_WEBHOOK_SECRET:
    external: true
  mecontrola_KIWIFY_WEBHOOK_SECRET_NEXT:
    external: true
  mecontrola_OPENROUTER_API_KEY:
    external: true
  mecontrola_ONBOARDING_TOKEN_ENCRYPTION_KEY:
    external: true
  mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_CURRENT:
    external: true
  mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_NEXT:
    external: true
  mecontrola_SMTP_USERNAME:
    external: true
  mecontrola_SMTP_PASSWORD:
    external: true
  mecontrola_RESEND_API_KEY:
    external: true
  mecontrola_META_PHONE_NUMBER_ID:
    external: true
  mecontrola_KIWIFY_PRODUCT_ID_MONTHLY:
    external: true
  mecontrola_KIWIFY_PRODUCT_ID_QUARTERLY:
    external: true
  mecontrola_KIWIFY_PRODUCT_ID_ANNUAL:
    external: true

volumes:
  postgres-data:
    name: mecontrola_postgres-data
  pgbackrest-repo:
    name: mecontrola_pgbackrest-repo
  caddy-data:
    name: mecontrola_caddy-data
  caddy-config:
    name: mecontrola_caddy-config
  otel-lgtm-grafana:
    name: mecontrola_otel-lgtm-grafana
  otel-lgtm-prometheus:
    name: mecontrola_otel-lgtm-prometheus
  otel-lgtm-loki:
    name: mecontrola_otel-lgtm-loki
  otel-lgtm-tempo:
    name: mecontrola_otel-lgtm-tempo

networks:
  backend:
    name: mecontrola_backend
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: true
  frontend:
    name: mecontrola_frontend
    driver: overlay
    attachable: false
