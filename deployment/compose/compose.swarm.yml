version: "3.8"

# Stack de produção no Docker Swarm single-node.
# Substitui compose.yml + compose.prod.yml em produção.
#
# Uso:
#   docker stack deploy -c deployment/compose/compose.swarm.yml mecontrola
#
# Requisitos:
#   - Docker Swarm inicializado no host de deploy.
#   - Imagem da aplicação já publicada com tag imutável em IMAGE_TAG.
#   - Arquivo .env presente na raiz do repositório (resolvido via ../../.env).
#   - Para pgBackRest/PITR, usar POSTGRES_IMAGE=mecontrola-postgres:<tag>.
#
# Observação sobre ordem de startup:
#   Docker Swarm não honra `depends_on.condition` do Compose. A ordem
#   determinística (postgres → pgbouncer → migrate → server/worker → caddy)
#   é garantida pelos healthchecks e pelas políticas de restart: services
#   downstream falham e são reiniciados até os upstreams ficarem saudáveis.

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"
    compress: "true"

x-default-deploy: &default-deploy
  replicas: 1
  update_config:
    parallelism: 1
    delay: 20s
    failure_action: pause
    order: stop-first
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

x-app-secrets: &app-secrets
  - source: mecontrola_DB_PASSWORD
    target: DB_PASSWORD
    mode: 0440
  - source: mecontrola_META_ACCESS_TOKEN
    target: META_ACCESS_TOKEN
    mode: 0440
  - source: mecontrola_META_APP_SECRET
    target: META_APP_SECRET
    mode: 0440
  - source: mecontrola_KIWIFY_WEBHOOK_SECRET
    target: KIWIFY_WEBHOOK_SECRET
    mode: 0440
  - source: mecontrola_KIWIFY_CLIENT_SECRET
    target: KIWIFY_CLIENT_SECRET
    mode: 0440
  - source: mecontrola_OPENROUTER_API_KEY
    target: OPENROUTER_API_KEY
    mode: 0440
  - source: mecontrola_ONBOARDING_TOKEN_ENCRYPTION_KEY
    target: ONBOARDING_TOKEN_ENCRYPTION_KEY
    mode: 0440
  - source: mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_CURRENT
    target: IDENTITY_GATEWAY_SHARED_SECRET_CURRENT
    mode: 0440
  - source: mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_NEXT
    target: IDENTITY_GATEWAY_SHARED_SECRET_NEXT
    mode: 0440

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_USER: ${DB_USER:-mecontrola}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-mecontrola_db}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGBACKREST_REPO1_S3_ENDPOINT: ${PGBACKREST_S3_ENDPOINT:-}
      PGBACKREST_REPO1_S3_BUCKET: ${PGBACKREST_S3_BUCKET:-}
      PGBACKREST_REPO1_S3_REGION: ${PGBACKREST_S3_REGION:-us-east-1}
      PGBACKREST_REPO1_S3_KEY: ${PGBACKREST_S3_KEY:-}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PGBACKREST_S3_KEY_SECRET:-}
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - pgbackrest-repo:/pgbackrest
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mecontrola} -d ${DB_NAME:-mecontrola_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-mecontrola}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-mecontrola_db}
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "300"
      DEFAULT_POOL_SIZE: "15"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      MAX_DB_CONNECTIONS: "60"
      SERVER_IDLE_TIMEOUT: "600"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
    networks:
      - backend
    depends_on:
      - postgres
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "pgrep pgbouncer || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    secrets:
      - source: mecontrola_DB_PASSWORD
        target: DB_PASSWORD
        mode: 0440

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-mecontrola}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/${DB_NAME:-mecontrola_db}?sslmode=disable"
    networks:
      - backend
    depends_on:
      - postgres
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["migrate"]
    env_file: ../../.env
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    networks:
      - backend
    depends_on:
      - postgres
      - pgbouncer
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 20s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: none
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    logging: *default-logging
    secrets:
      - source: mecontrola_DB_PASSWORD
        target: DB_PASSWORD
        mode: 0440

  server-1:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["server"]
    env_file: ../../.env
    environment:
      APP_MODE: server
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "0.1"
    networks:
      - backend
      - frontend
    depends_on:
      - postgres
      - pgbouncer
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 128M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  server-2:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["server"]
    env_file: ../../.env
    environment:
      APP_MODE: server
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "0.1"
    networks:
      - backend
      - frontend
    depends_on:
      - postgres
      - pgbouncer
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 128M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  worker-1:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["worker"]
    env_file: ../../.env
    environment:
      APP_MODE: worker
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "0.1"
    networks:
      - backend
    depends_on:
      - postgres
      - pgbouncer
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.05"
          memory: 64M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  worker-2:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    command: ["worker"]
    env_file: ../../.env
    environment:
      APP_MODE: worker
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "0.1"
    networks:
      - backend
    depends_on:
      - postgres
      - pgbouncer
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.50"
          memory: 384M
        reservations:
          cpus: "0.05"
          memory: 64M
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8081/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    secrets: *app-secrets

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    env_file: ../../.env
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    depends_on:
      - server-1
      - server-2
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  otel-lgtm:
    image: grafana/otel-lgtm:0.7.5
    environment:
      GF_SECURITY_ADMIN_USER: ${OTEL_LGTM_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${OTEL_LGTM_ADMIN_PASSWORD:?OTEL_LGTM_ADMIN_PASSWORD is required in production}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
    ports:
      - target: 3000
        published: 3000
        mode: host
    volumes:
      - ../telemetry/grafana/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ../telemetry/grafana/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
      - ../telemetry/grafana/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro
      - ../telemetry/grafana/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ../telemetry/grafana/run-prometheus.sh:/otel-lgtm/run-prometheus.sh:ro
      - ../dashboards:/etc/dashboards:ro
      - ../telemetry/grafana/provisioning/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/mecontrola.yaml:ro
      - ../telemetry/grafana/provisioning/alerting:/otel-lgtm/grafana/conf/provisioning/alerting:ro
      - ../telemetry/grafana/provisioning/alerting/contact-points.rendered.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/contact-points.yaml:ro
      - otel-lgtm-grafana:/otel-lgtm/grafana/data
      - otel-lgtm-prometheus:/data/prometheus
      - otel-lgtm-loki:/loki
      - otel-lgtm-tempo:/tmp/tempo
    networks:
      - backend
      - frontend
    depends_on:
      - postgres
    deploy:
      <<: *default-deploy
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.10"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:13133/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  pg-tunnel:
    image: alpine/socat:latest
    command: TCP-LISTEN:5432,fork,reuseaddr TCP:postgres:5432
    ports:
      - target: 5432
        published: 15432
        protocol: tcp
        mode: host
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        limits:
          cpus: "0.05"
          memory: 16M
        reservations:
          cpus: "0.01"
          memory: 8M
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

secrets:
  mecontrola_DB_PASSWORD:
    external: true
  mecontrola_META_ACCESS_TOKEN:
    external: true
  mecontrola_META_APP_SECRET:
    external: true
  mecontrola_KIWIFY_WEBHOOK_SECRET:
    external: true
  mecontrola_KIWIFY_CLIENT_SECRET:
    external: true
  mecontrola_OPENROUTER_API_KEY:
    external: true
  mecontrola_ONBOARDING_TOKEN_ENCRYPTION_KEY:
    external: true
  mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_CURRENT:
    external: true
  mecontrola_IDENTITY_GATEWAY_SHARED_SECRET_NEXT:
    external: true

volumes:
  postgres-data:
    name: mecontrola_postgres-data
  pgbackrest-repo:
    name: mecontrola_pgbackrest-repo
  caddy-data:
    name: mecontrola_caddy-data
  caddy-config:
    name: mecontrola_caddy-config
  otel-lgtm-grafana:
    name: mecontrola_otel-lgtm-grafana
  otel-lgtm-prometheus:
    name: mecontrola_otel-lgtm-prometheus
  otel-lgtm-loki:
    name: mecontrola_otel-lgtm-loki
  otel-lgtm-tempo:
    name: mecontrola_otel-lgtm-tempo

networks:
  backend:
    name: mecontrola_backend
    driver: overlay
    driver_opts:
      encrypted: "true"
    attachable: true
  frontend:
    name: mecontrola_frontend
    driver: overlay
    attachable: false
