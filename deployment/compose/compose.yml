name: mecontrola

# Arquivo base. Sobreponha com:
#   Local: docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.local.yml up
#   Prod:  docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-mecontrola}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-mecontrola_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mecontrola} -d ${DB_NAME:-mecontrola_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["migrate"]
    env_file: ../../.env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["server"]
    env_file: ../../.env
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["worker"]
    env_file: ../../.env
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    depends_on:
      - server

  promtail:
    image: grafana/promtail:3.5.0
    command: ["-config.file=/etc/promtail/config.yml"]
    profiles: ["observability"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../promtail/config.yml:/etc/promtail/config.yml:ro
    networks:
      - frontend

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  # postgres isolado sem acesso à internet
  backend:
    driver: bridge
    internal: true
  # server/worker/caddy com acesso padrão
  frontend:
    driver: bridge
