name: mecontrola

# Arquivo base.
# Local:  docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.local.yml up
# Prod:   docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.prod.yml up -d
# Obs:    adicionar --profile observability para subir stack de monitoramento

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: ${DB_USER:-mecontrola}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-mecontrola_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mecontrola} -d ${DB_NAME:-mecontrola_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-mecontrola}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-mecontrola_db}
      AUTH_TYPE: md5
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      MAX_DB_CONNECTIONS: "50"
      SERVER_IDLE_TIMEOUT: "600"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep pgbouncer || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["migrate"]
    env_file: ../../.env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["server"]
    env_file: ../../.env
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["worker"]
    env_file: ../../.env
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/pgrep", "mecontrola"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  promtail:
    image: grafana/promtail:3.5.0
    command: ["-config.file=/etc/promtail/config.yml"]
    profiles: ["observability"]
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../promtail/config.yml:/etc/promtail/config.yml:ro
    networks:
      - frontend

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.121.0
    command: ["--config=/etc/otelcol/config.yml"]
    profiles: ["observability"]
    environment:
      LOKI_URL: ${LOKI_URL:-http://localhost:3100/loki/api/v1/push}
      LOKI_USER_ID: ${LOKI_USER_ID:-0}
      LOKI_API_KEY: ${LOKI_API_KEY:-}
    volumes:
      - ../telemetry/otelcol/config.prod.yml:/etc/otelcol/config.yml:ro
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.3.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-otlp-receiver
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    profiles: ["observability"]
    volumes:
      - ../telemetry/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus-rules.yaml:/etc/prometheus/rules.yaml:ro
      - ../telemetry/prometheus/ssl_targets.json:/etc/prometheus/targets/ssl_targets.json:ro
      - prometheus-data:/prometheus
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    profiles: ["observability"]
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.9.1
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
    profiles: ["observability"]
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
      - node-exporter-textfile:/var/lib/node_exporter/textfile_collector
    networks:
      - frontend

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-mecontrola}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-mecontrola_db}?sslmode=disable"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
    profiles: ["observability"]
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.25.0
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    profiles: ["observability"]
    volumes:
      - ../telemetry/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - frontend

  grafana:
    image: grafana/grafana:12.0.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin@dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_LOKI_URL: ${LOKI_URL:-}
      LOKI_URL: ${LOKI_URL:-}
      LOKI_USER_ID: ${LOKI_USER_ID:-}
      LOKI_API_KEY: ${LOKI_API_KEY:-}
    profiles: ["observability"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ../telemetry/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana:/var/lib/grafana/dashboards:ro
    networks:
      - frontend
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  node-exporter-textfile:

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
