name: mecontrola

# Arquivo base.
# Local (compose completo): docker compose -f deployment/compose/compose.yml -f deployment/compose/compose.local.yml up
# Prod (Swarm):             task swarm:prod:deploy:full IMAGE_TAG=<tag>  (via deployment/scripts/deploy-swarm.sh)
# Obs:    o stack de observabilidade (metrics, traces, logs) e o container unico
#         grafana/otel-lgtm, definido no arquivo de override local.

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: ${DB_USER:-mecontrola}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-mecontrola_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mecontrola} -d ${DB_NAME:-mecontrola_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-mecontrola}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-mecontrola_db}
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      MAX_DB_CONNECTIONS: "50"
      SERVER_IDLE_TIMEOUT: "600"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep pgbouncer || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["migrate"]
    env_file: ../../.env
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["server"]
    env_file: ../../.env
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:-latest}
    command: ["worker"]
    env_file: ../../.env
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/pgrep", "mecontrola"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    env_file: ../../.env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
