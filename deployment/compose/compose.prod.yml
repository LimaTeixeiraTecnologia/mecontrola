name: mecontrola

# Overrides de produção — VPS Hostinger.
# Uso: IMAGE_TAG=<sha> docker compose \
#        -f deployment/compose/compose.yml \
#        -f deployment/compose/compose.prod.yml \
#        up -d
# Este arquivo remove o profile "observability" de todos os serviços de monitoramento
# via "profiles: []", portanto NÃO é necessário --profile observability em produção.
# IMAGE_TAG deve ser um digest ou tag semântica imutável; nunca usar 'latest' em prod.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"
    compress: "true"

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    logging: *default-logging
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGBACKREST_REPO1_S3_ENDPOINT: ${PGBACKREST_S3_ENDPOINT:-}
      PGBACKREST_REPO1_S3_BUCKET: ${PGBACKREST_S3_BUCKET:-}
      PGBACKREST_REPO1_S3_REGION: ${PGBACKREST_S3_REGION:-us-east-1}
      PGBACKREST_REPO1_S3_KEY: ${PGBACKREST_S3_KEY:-}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PGBACKREST_S3_KEY_SECRET:-}
      PGBACKREST_REPO1_CIPHER_PASS: ${PGBACKREST_REPO1_CIPHER_PASS:-}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M

  pgbouncer:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    logging: *default-logging
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"

  server:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    restart: unless-stopped
    logging: *default-logging
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "0.1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    depends_on:
      otel-lgtm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  worker:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    restart: unless-stopped
    logging: *default-logging
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-lgtm:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACE_SAMPLE_RATE: "0.1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    depends_on:
      otel-lgtm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  caddy:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  otel-lgtm:
    image: grafana/otel-lgtm:0.7.5
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${OTEL_LGTM_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${OTEL_LGTM_ADMIN_PASSWORD:?OTEL_LGTM_ADMIN_PASSWORD is required in production}
      ALERT_TELEGRAM_BOT_TOKEN: ${ALERT_TELEGRAM_BOT_TOKEN:-}
      ALERT_TELEGRAM_CHAT_ID: ${ALERT_TELEGRAM_CHAT_ID:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ../telemetry/grafana/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      - ../telemetry/grafana/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
      - ../telemetry/grafana/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro
      - ../telemetry/grafana/run-prometheus.sh:/otel-lgtm/run-prometheus.sh:ro
      - ../dashboards:/etc/dashboards:ro
      - ../telemetry/grafana/provisioning/dashboards-provider.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/mecontrola.yaml:ro
      - ../telemetry/grafana/provisioning/alerting:/otel-lgtm/grafana/conf/provisioning/alerting:ro
      - otel-lgtm-grafana:/otel-lgtm/grafana/data
      - otel-lgtm-prometheus:/data/prometheus
      - otel-lgtm-loki:/loki
      - otel-lgtm-tempo:/tmp/tempo
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:13133/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

volumes:
  otel-lgtm-grafana:
  otel-lgtm-prometheus:
  otel-lgtm-loki:
  otel-lgtm-tempo:
