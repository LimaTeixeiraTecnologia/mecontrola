name: mecontrola

# Overrides de produção — VPS Hostinger.
# Uso: IMAGE_TAG=<sha> docker compose \
#        -f deployment/compose/compose.yml \
#        -f deployment/compose/compose.prod.yml \
#        up -d
# Este arquivo remove o profile "observability" de todos os serviços de monitoramento
# via "profiles: []", portanto NÃO é necessário --profile observability em produção.
# IMAGE_TAG deve ser um digest ou tag semântica imutável; nunca usar 'latest' em prod.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"
    compress: "true"

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    logging: *default-logging
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    environment:
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      PGBACKREST_REPO1_S3_ENDPOINT: ${PGBACKREST_S3_ENDPOINT:-}
      PGBACKREST_REPO1_S3_BUCKET: ${PGBACKREST_S3_BUCKET:-}
      PGBACKREST_REPO1_S3_REGION: ${PGBACKREST_S3_REGION:-us-east-1}
      PGBACKREST_REPO1_S3_KEY: ${PGBACKREST_S3_KEY:-}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PGBACKREST_S3_KEY_SECRET:-}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M

  pgbouncer:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

  migrate:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    logging: *default-logging
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"

  server:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    restart: unless-stopped
    logging: *default-logging
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otelcol:4317
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  worker:
    image: ${IMAGE_NAME:-ghcr.io/limateixeiratecnologia/mecontrola}:${IMAGE_TAG:?IMAGE_TAG must be set for production}
    restart: unless-stopped
    logging: *default-logging
    environment:
      ENVIRONMENT: production
      LOG_FORMAT: json
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      DB_SSL_MODE: disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otelcol:4317
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    user: "65532:65532"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  caddy:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  promtail:
    profiles: []
    restart: unless-stopped
    logging: *default-logging

  otelcol:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M

  prometheus:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  alertmanager:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:9093:9093"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          memory: 16M

  node-exporter:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  postgres-exporter:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  blackbox-exporter:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 32M

  grafana:
    profiles: []
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SERVER_ROOT_URL: https://${APP_DOMAIN}/grafana
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
