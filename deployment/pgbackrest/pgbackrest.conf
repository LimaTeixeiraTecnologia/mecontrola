# pgbackrest.conf — valores sensíveis NUNCA vão aqui.
# pgBackRest NÃO expande ${VAR} no arquivo de config.
# Credenciais S3 são injetadas via variáveis de ambiente no container postgres:
#   PGBACKREST_REPO1_S3_ENDPOINT, PGBACKREST_REPO1_S3_BUCKET,
#   PGBACKREST_REPO1_S3_REGION, PGBACKREST_REPO1_S3_KEY, PGBACKREST_REPO1_S3_KEY_SECRET
# Ver compose.prod.yml seção postgres.environment.

[global]
repo1-type=s3
repo1-s3-bucket=mecontrola-backups-660838763799-use1
repo1-s3-region=us-east-1
repo1-s3-endpoint=s3.us-east-1.amazonaws.com
repo1-path=/pgbackrest

repo1-retention-full=4
repo1-retention-diff=7
repo1-retention-archive-type=diff
repo1-retention-archive=2

repo1-cipher-type=aes-256-cbc

compress-type=lz4
compress-level=3

archive-async=y
archive-push-queue-max=4GiB

log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

start-fast=y
stop-auto=y
resume=n

[global:archive-push]
compress-level=1

[mecontrola]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-database=mecontrola_db
pg1-user=mecontrola
